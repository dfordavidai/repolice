
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RePolice – Secure Crime Reporting Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f8fafc; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  button { cursor: pointer; transition: opacity 0.15s; }
  button:hover { opacity: 0.88; }
  select, input, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

  { id:"RPT-004", type:"Kidnapping",       urgency:"Critical", status:"Submitted",    location:"Lekki Phase 1, Lagos",   time:"45 mins ago",  description:"Child reported missing from school premises, last seen at 2PM near the gate", reporter:"+234 805 678 9012", media:0, officer:null, badge:null, corroborated:2 },

  { id:"RPT-006", type:"Drug Related",     urgency:"Medium",   status:"Investigating",location:"Agege, Lagos",           time:"3 hrs ago",    description:"Suspected drug distribution point identified behind Agege stadium, daily activity observed", reporter:"Anonymous", media:2, officer:"Sgt. Adebayo M.", badge:"LG-4421", corroborated:5 },

  { id:"LG-4421", name:"Sgt. Adebayo Musa",  rank:"Sergeant",  station:"Ikeja Division",     status:"On Duty",  cases:4, resolved:28 },
  { id:"LG-3310", name:"Cpl. Emeka Okafor",  rank:"Corporal",  station:"VI Division",        status:"On Scene", cases:2, resolved:15 },
  { id:"LG-5502", name:"Sgt. Kabiru Yusuf",  rank:"Sergeant",  station:"Surulere Division",  status:"On Duty",  cases:3, resolved:21 },
  { id:"LG-2201", name:"Cpl. Peter Eze",     rank:"Corporal",  station:"Yaba Division",      status:"Off Duty", cases:0, resolved:33 },
  { id:"LG-6603", name:"Insp. Fatima Bello", rank:"Inspector", station:"HQ Lagos",           status:"On Duty",  cases:1, resolved:47 },

const URGENCY_COLOR  = { Critical:"#ef4444", High:"#f97316", Medium:"#f59e0b", Low:"#22c55e" };
const STATUS_COLOR   = { Submitted:"#94a3b8", Assigned:"#3b82f6", "En Route":"#f59e0b", "On Scene":"#f97316", Investigating:"#8b5cf6", Resolved:"#22c55e" };
const STATUS_BG      = { Submitted:"#f1f5f9", Assigned:"#eff6ff", "En Route":"#fffbeb", "On Scene":"#fff7ed", Investigating:"#f5f3ff", Resolved:"#f0fdf4" };
function genId(){ return "#"+Math.random().toString(36).substring(2,10).toUpperCase(); }

// ── SHARED COMPONENTS ──────────────────────────────────────────────────────
function Badge({label,color,bg}){
  return <span style={{background:bg||"#f1f5f9",color:color||"#64748b",fontSize:"11px",fontWeight:"700",padding:"3px 9px",borderRadius:"20px",letterSpacing:"0.3px",whiteSpace:"nowrap"}}>{label}</span>;
}
function StatCard({icon,label,value,sub,accent}){
  return(
    <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"20px 22px",borderLeft:`4px solid ${accent||"#3b82f6"}`}}>
      <div style={{fontSize:"22px",marginBottom:"8px"}}>{icon}</div>
      <div style={{fontSize:"26px",fontWeight:"800",color:"#0f172a",lineHeight:1}}>{value}</div>
      <div style={{fontSize:"13px",color:"#64748b",marginTop:"4px"}}>{label}</div>
      {sub&&<div style={{fontSize:"11px",color:"#94a3b8",marginTop:"3px"}}>{sub}</div>}
    </div>
  );
}
function Modal({children,onClose}){
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:"20px"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:"16px",width:"100%",maxWidth:"600px",maxHeight:"90vh",overflow:"auto",boxShadow:"0 25px 60px rgba(0,0,0,0.3)"}}>
        {children}
      </div>
    </div>
  );
}

// ── NAVBAR ─────────────────────────────────────────────────────────────────

        <div>
          <div style={{color:"white",fontWeight:"700",fontSize:"16px",lineHeight:1}}>RePolice</div>

        <button onClick={onAdminLogin} style={{background:"none",border:"1px solid #334155",color:"#94a3b8",borderRadius:"6px",padding:"6px 14px",fontSize:"12px"}}>🛡️ Admin Login</button>
        <button onClick={onReportCrime} style={{background:"#f59e0b",color:"#0f172a",border:"none",borderRadius:"6px",padding:"8px 18px",fontWeight:"700",fontSize:"13px"}}>Report Crime</button>

// ── LOGIN MODAL ────────────────────────────────────────────────────────────
function LoginModal({role,onSuccess,onClose}){
  const [badge,setBadge]=useState(""); const [otp,setOtp]=useState("");
  const [step,setStep]=useState(1); const [loading,setLoading]=useState(false); const [error,setError]=useState("");
  const CREDS=role==="police"?{badge:"LG-4421",otp:"112112"}:{badge:"ADMIN-01",otp:"999999"};
  async function handleBadge(){
    if(!badge){setError("Enter your ID");return;} setLoading(true); setError("");
    await new Promise(r=>setTimeout(r,700)); setLoading(false);
    if(badge.toUpperCase()!==CREDS.badge){setError("ID not found");return;} setStep(2);
  }
  async function handleOtp(){
    if(!otp){setError("Enter OTP");return;} setLoading(true); setError("");
    await new Promise(r=>setTimeout(r,700)); setLoading(false);
    if(otp!==CREDS.otp){setError("Invalid OTP — try "+CREDS.otp);return;} onSuccess();
  }
  return(
    <Modal onClose={onClose}>
      <div style={{padding:"36px 40px"}}>
        <div style={{fontSize:"32px",marginBottom:"8px"}}>{role==="police"?"👮":"🛡️"}</div>
        <h2 style={{fontSize:"20px",fontWeight:"800",color:"#0f172a",marginBottom:"4px"}}>{role==="police"?"Police Officer Login":"Admin Panel Login"}</h2>
        <p style={{fontSize:"13px",color:"#94a3b8",marginBottom:"28px"}}>{step===1?`Enter your ${role==="police"?"Badge ID":"Admin ID"}`:"Enter OTP sent to your registered number"}</p>
        {step===1?(
          <>
            <label style={{fontSize:"13px",fontWeight:"600",color:"#374151",display:"block",marginBottom:"6px"}}>{role==="police"?"Badge ID":"Admin ID"}</label>
            <input value={badge} onChange={e=>setBadge(e.target.value)} placeholder={role==="police"?"e.g. LG-4421":"e.g. ADMIN-01"}
              style={{width:"100%",padding:"11px 14px",border:"1px solid #d1d5db",borderRadius:"8px",fontSize:"14px",marginBottom:"8px",outline:"none"}} />
            {error&&<p style={{color:"#ef4444",fontSize:"12px",marginBottom:"8px"}}>{error}</p>}
            <p style={{fontSize:"11px",color:"#94a3b8",marginBottom:"20px"}}>Demo ID: <strong>{CREDS.badge}</strong></p>
            <button onClick={handleBadge} style={{width:"100%",background:"#0f172a",color:"white",border:"none",borderRadius:"8px",padding:"13px",fontWeight:"700",fontSize:"14px"}}>{loading?"Verifying...":"Continue"}</button>
          </>
        ):(
          <>
            <label style={{fontSize:"13px",fontWeight:"600",color:"#374151",display:"block",marginBottom:"6px"}}>OTP Code</label>
            <input value={otp} onChange={e=>setOtp(e.target.value)} placeholder="6-digit OTP"
              style={{width:"100%",padding:"11px 14px",border:"1px solid #d1d5db",borderRadius:"8px",fontSize:"18px",marginBottom:"8px",outline:"none",letterSpacing:"8px",textAlign:"center"}} />
            {error&&<p style={{color:"#ef4444",fontSize:"12px",marginBottom:"8px"}}>{error}</p>}
            <p style={{fontSize:"11px",color:"#94a3b8",marginBottom:"20px"}}>Demo OTP: <strong>{CREDS.otp}</strong></p>
            <button onClick={handleOtp} style={{width:"100%",background:role==="police"?"#1d4ed8":"#7c3aed",color:"white",border:"none",borderRadius:"8px",padding:"13px",fontWeight:"700",fontSize:"14px"}}>{loading?"Authenticating...":"Login"}</button>
          </>
        )}
        <button onClick={onClose} style={{width:"100%",background:"none",border:"none",color:"#94a3b8",fontSize:"13px",marginTop:"12px"}}>Cancel</button>
      </div>
    </Modal>
  );
}

// ── REPORT FORM ────────────────────────────────────────────────────────────
function StepBar({step}){
  return(
    <div style={{display:"flex",height:"5px",gap:"4px",marginBottom:"28px"}}>
      {[1,2,3].map(s=><div key={s} style={{flex:1,borderRadius:"3px",background:s<=step?"#f59e0b":"#e2e8f0",transition:"background 0.3s"}}/>)}
    </div>
  );
}

function ReportForm({onSuccess,onCancel}){
  const [step,setStep]=useState(1);
  const [crimeType,setCrimeType]=useState("Theft/Robbery");
  const [urgency,setUrgency]=useState("Low (Non-emergency)");
  const [description,setDescription]=useState("");
  const [anonymous,setAnonymous]=useState(false);
  const [submitting,setSubmitting]=useState(false);

  async function handleSubmit(){
    setSubmitting(true);
    await new Promise(r=>setTimeout(r,1800));
    onSuccess();
  }

  const urgencyOpts=["Low (Non-emergency)","Medium","High (Emergency)","Critical (Life-threatening)"];

  return(
    <div style={{background:"#f8fafc",minHeight:"calc(100vh - 60px)",display:"flex",justifyContent:"center",paddingTop:"40px",paddingBottom:"40px"}}>
      <div style={{background:"white",borderRadius:"16px",border:"1px solid #e2e8f0",padding:"36px 40px",width:"100%",maxWidth:"520px",height:"fit-content"}}>
        <StepBar step={step}/>
        {step===1&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
              <h2 style={{fontSize:"22px",fontWeight:"800",color:"#0f172a"}}>Incident Details</h2>
              <button onClick={onCancel} style={{background:"none",border:"none",color:"#94a3b8",fontSize:"14px"}}>Cancel</button>
            </div>
            <p style={{fontSize:"13px",color:"#94a3b8",marginBottom:"20px"}}>Step 1 of 3</p>
            <div onClick={()=>setAnonymous(!anonymous)} style={{display:"flex",alignItems:"center",gap:"10px",background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:"8px",padding:"10px 14px",marginBottom:"18px",cursor:"pointer"}}>
              <div style={{width:"18px",height:"18px",borderRadius:"4px",border:anonymous?"none":"2px solid #d1d5db",background:anonymous?"#22c55e":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {anonymous&&<span style={{color:"white",fontSize:"12px",lineHeight:1}}>✓</span>}
              </div>
              <span style={{fontSize:"13px",fontWeight:"600",color:"#166534"}}>🔒 File Anonymously (identity hidden)</span>
            </div>
            <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"6px"}}>Type of Crime</label>
            <select value={crimeType} onChange={e=>setCrimeType(e.target.value)} style={{width:"100%",padding:"11px 14px",border:"1px solid #d1d5db",borderRadius:"8px",fontSize:"14px",marginBottom:"18px",background:"white"}}>
              {["Theft/Robbery","Assault","Vandalism","Fraud/Scam","Kidnapping","Drug Related","Cybercrime","Murder/Attempted Murder","Other"].map(o=><option key={o}>{o}</option>)}
            </select>
            <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"8px"}}>Urgency Level</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"18px"}}>
              {urgencyOpts.map(opt=>(
                <button key={opt} onClick={()=>setUrgency(opt)} style={{padding:"12px",border:urgency===opt?"none":"1px solid #d1d5db",borderRadius:"8px",background:urgency===opt?"#0f172a":"white",color:urgency===opt?"white":"#374151",fontWeight:urgency===opt?"700":"500",fontSize:"12px"}}>
                  {opt}
                </button>
              ))}
            </div>
            <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"6px"}}>Detailed Description</label>
            <textarea value={description} onChange={e=>setDescription(e.target.value)} placeholder="Describe what happened, who was involved, and any specific details..."
              style={{width:"100%",minHeight:"100px",padding:"12px 14px",border:description?"2px solid #f59e0b":"1px solid #d1d5db",borderRadius:"8px",fontSize:"13px",resize:"vertical",outline:"none",fontFamily:"inherit",marginBottom:"22px"}}/>
            <button onClick={()=>setStep(2)} style={{width:"100%",background:"#0f172a",color:"white",border:"none",borderRadius:"8px",padding:"14px",fontWeight:"700",fontSize:"15px"}}>Continue</button>
          </div>
        )}
        {step===2&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
              <h2 style={{fontSize:"22px",fontWeight:"800",color:"#0f172a"}}>Location & Evidence</h2>
              <button onClick={onCancel} style={{background:"none",border:"none",color:"#94a3b8",fontSize:"14px"}}>Cancel</button>
            </div>
            <p style={{fontSize:"13px",color:"#94a3b8",marginBottom:"22px"}}>Step 2 of 3</p>
            <div style={{border:"1px solid #e2e8f0",borderRadius:"10px",padding:"16px",marginBottom:"18px"}}>

// ── REPORT DETAIL MODAL ────────────────────────────────────────────────────
function ReportDetailModal({report,onClose,onStatusChange,isAdmin}){
  const [status,setStatus]=useState(report.status);
  const [note,setNote]=useState("");
  const [notes,setNotes]=useState([{author:"System",text:"Report received and logged.",time:"Auto"}]);
  function handleStatus(s){ setStatus(s); if(onStatusChange) onStatusChange(report.id,s); }
  function addNote(){ if(!note.trim()) return; setNotes([...notes,{author:isAdmin?"Admin":"Officer",text:note,time:"Just now"}]); setNote(""); }
  const statusFlow=["Submitted","Assigned","En Route","On Scene","Investigating","Resolved"];
  return(
    <Modal onClose={onClose}>
      <div style={{padding:"28px 32px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"20px"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"4px",flexWrap:"wrap"}}>
              <span style={{fontWeight:"800",fontSize:"18px",color:"#0f172a"}}>{report.id}</span>
              <Badge label={report.urgency} color={URGENCY_COLOR[report.urgency]} bg={URGENCY_COLOR[report.urgency]+"20"}/>
              <Badge label={status} color={STATUS_COLOR[status]} bg={STATUS_BG[status]}/>
            </div>
            <div style={{fontSize:"13px",color:"#64748b"}}>{report.type} • {report.location} • {report.time}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:"20px",color:"#94a3b8"}}>✕</button>
        </div>
        <div style={{background:"#f8fafc",borderRadius:"8px",padding:"14px 16px",marginBottom:"18px"}}>
          <div style={{fontWeight:"600",fontSize:"12px",color:"#64748b",marginBottom:"6px"}}>DESCRIPTION</div>
          <p style={{fontSize:"13px",color:"#374151",lineHeight:1.6}}>{report.description}</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"18px"}}>
          {[["Reporter",report.reporter],["Officer",report.officer||"Unassigned"],["Badge",report.badge||"—"],["Media",report.media+" file(s)"],["Corroborated",report.corroborated+" witness(es)"],["Location",report.location]].map(([k,v])=>(
            <div key={k} style={{background:"#f8fafc",borderRadius:"6px",padding:"10px 12px"}}>
              <div style={{fontSize:"10px",color:"#94a3b8",fontWeight:"700",letterSpacing:"0.5px",marginBottom:"3px"}}>{k.toUpperCase()}</div>
              <div style={{fontSize:"13px",fontWeight:"600",color:"#374151"}}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{marginBottom:"18px"}}>
          <div style={{fontWeight:"600",fontSize:"12px",color:"#64748b",marginBottom:"10px"}}>UPDATE STATUS</div>
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
            {statusFlow.map(s=>(
              <button key={s} onClick={()=>handleStatus(s)} style={{padding:"6px 12px",border:"none",borderRadius:"20px",fontSize:"12px",fontWeight:"600",background:status===s?STATUS_COLOR[s]:"#f1f5f9",color:status===s?"white":"#64748b"}}>
                {s}
              </button>
            ))}
          </div>
        </div>
        <div>
          <div style={{fontWeight:"600",fontSize:"12px",color:"#64748b",marginBottom:"10px"}}>CASE NOTES</div>
          <div style={{background:"#f8fafc",borderRadius:"8px",padding:"12px",marginBottom:"10px",maxHeight:"120px",overflowY:"auto"}}>
            {notes.map((n,i)=>(
              <div key={i} style={{fontSize:"12px",color:"#374151",marginBottom:"6px"}}>
                <span style={{fontWeight:"700",color:"#0f172a"}}>{n.author}</span>
                <span style={{color:"#94a3b8",margin:"0 6px"}}>{n.time}</span>{n.text}
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:"8px"}}>
            <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Add a case note..." style={{flex:1,padding:"8px 12px",border:"1px solid #d1d5db",borderRadius:"6px",fontSize:"13px",outline:"none"}}/>
            <button onClick={addNote} style={{background:"#0f172a",color:"white",border:"none",borderRadius:"6px",padding:"8px 14px",fontWeight:"600",fontSize:"13px"}}>Add</button>
          </div>
        </div>
      </div>
    </Modal>
  );
}

// ── ADMIN PANEL ────────────────────────────────────────────────────────────
function AdminPanel({onLogout}){
  const [reports,setReports]=useState(MOCK_REPORTS);
  const [activeTab,setActiveTab]=useState("dashboard");
  const [selectedReport,setSelectedReport]=useState(null);
  const [filterType,setFilterType]=useState("All");
  const [filterStatus,setFilterStatus]=useState("All");
  const [broadcastMsg,setBroadcastMsg]=useState("");
  const [broadcasted,setBroadcasted]=useState(false);

  function updateStatus(id,s){ setReports(prev=>prev.map(r=>r.id===id?{...r,status:s}:r)); }
  async function handleBroadcast(){
    if(!broadcastMsg) return;
    await new Promise(r=>setTimeout(r,600));
    setBroadcasted(true); setTimeout(()=>setBroadcasted(false),3000); setBroadcastMsg("");
  }

  const tabs=[{id:"dashboard",label:"Dashboard",icon:"📊"},{id:"reports",label:"All Reports",icon:"📋"},{id:"officers",label:"Officers",icon:"👮"},{id:"heatmap",label:"Crime Heatmap",icon:"🗺️"},{id:"sos",label:"SOS Log",icon:"🆘"},{id:"broadcast",label:"Broadcast",icon:"📢"},{id:"analytics",label:"Analytics",icon:"📈"},{id:"vault",label:"Evidence Vault",icon:"🔒"}];
  const stats={total:reports.length,active:reports.filter(r=>r.status!=="Resolved").length,critical:reports.filter(r=>r.urgency==="Critical").length,resolved:reports.filter(r=>r.status==="Resolved").length};
  const statusFilters=["All","Submitted","Assigned","En Route","On Scene","Investigating","Resolved"];
  const filteredReports=reports.filter(r=>(filterType==="All"||r.type===filterType)&&(filterStatus==="All"||r.status===filterStatus));

  return(
    <div style={{display:"flex",minHeight:"calc(100vh - 60px)",background:"#f0f4f8"}}>
      <div style={{width:"220px",background:"#4c1d95",padding:"24px 16px",display:"flex",flexDirection:"column",gap:"4px",flexShrink:0}}>
        <div style={{color:"white",fontWeight:"800",fontSize:"14px",marginBottom:"4px",paddingLeft:"8px"}}>ADMIN PANEL</div>
        <div style={{color:"#c4b5fd",fontSize:"11px",paddingLeft:"8px",marginBottom:"20px"}}>Super Administrator</div>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{background:activeTab===t.id?"rgba(255,255,255,0.15)":"none",border:"none",color:activeTab===t.id?"white":"#c4b5fd",borderRadius:"8px",padding:"10px 12px",textAlign:"left",fontSize:"13px",fontWeight:activeTab===t.id?"700":"500",display:"flex",alignItems:"center",gap:"8px"}}>
            {t.icon} {t.label}
          </button>
        ))}
        <div style={{marginTop:"auto"}}>
          <button onClick={onLogout} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#c4b5fd",borderRadius:"8px",padding:"10px 12px",width:"100%",textAlign:"left",fontSize:"13px"}}>🚪 Logout</button>
        </div>
      </div>

      <div style={{flex:1,padding:"32px",overflowY:"auto"}}>

        {activeTab==="dashboard"&&(
          <div>
            <h1 style={{fontSize:"24px",fontWeight:"800",color:"#0f172a",marginBottom:"4px"}}>Command Dashboard</h1>
            <p style={{color:"#64748b",fontSize:"13px",marginBottom:"28px"}}>Real-time overview — Lagos State</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"16px",marginBottom:"28px"}}>
              <StatCard icon="📋" label="Total Reports" value={stats.total} sub="All time" accent="#3b82f6"/>
              <StatCard icon="🔴" label="Active Incidents" value={stats.active} sub="Needs attention" accent="#ef4444"/>
              <StatCard icon="🚨" label="Critical Cases" value={stats.critical} sub="Immediate response" accent="#f97316"/>
              <StatCard icon="✅" label="Resolved Today" value={stats.resolved} sub="Closed cases" accent="#22c55e"/>
              <StatCard icon="⏱️" label="Avg Response" value="8 min" sub="Last 24 hours" accent="#8b5cf6"/>
              <StatCard icon="👮" label="Officers Active" value={MOCK_OFFICERS.filter(o=>o.status!=="Off Duty").length} sub={`of ${MOCK_OFFICERS.length} total`} accent="#f59e0b"/>
            </div>
            <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"20px 24px",marginBottom:"20px"}}>
              <div style={{fontWeight:"700",fontSize:"15px",color:"#0f172a",marginBottom:"16px"}}>🚨 Critical & High Priority Reports</div>
              {reports.filter(r=>r.urgency==="Critical"||r.urgency==="High").map(r=>(
                <div key={r.id} onClick={()=>setSelectedReport(r)} style={{display:"flex",alignItems:"center",gap:"14px",padding:"12px 0",borderBottom:"1px solid #f1f5f9",cursor:"pointer",flexWrap:"wrap"}}>
                  <div style={{width:"8px",height:"8px",borderRadius:"50%",background:URGENCY_COLOR[r.urgency],flexShrink:0}}></div>
                  <div style={{flex:1,minWidth:"120px"}}><span style={{fontWeight:"700",fontSize:"13px"}}>{r.id}</span><span style={{color:"#64748b",fontSize:"13px",marginLeft:"8px"}}>{r.type}</span></div>
                  <Badge label={r.urgency} color={URGENCY_COLOR[r.urgency]} bg={URGENCY_COLOR[r.urgency]+"20"}/>
                  <Badge label={r.status} color={STATUS_COLOR[r.status]} bg={STATUS_BG[r.status]}/>
                  <span style={{fontSize:"12px",color:"#94a3b8"}}>{r.time}</span>
                </div>
              ))}
            </div>
            {MOCK_SOS.filter(s=>s.status==="Active").length>0&&(
              <div style={{background:"#fff1f2",border:"2px solid #fecdd3",borderRadius:"12px",padding:"16px 20px",display:"flex",alignItems:"center",gap:"16px",flexWrap:"wrap"}}>
                <span style={{fontSize:"24px"}}>🆘</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:"700",fontSize:"14px",color:"#991b1b"}}>{MOCK_SOS.filter(s=>s.status==="Active").length} Active SOS Alert(s)</div>
                  <div style={{fontSize:"12px",color:"#ef4444"}}>{MOCK_SOS.find(s=>s.status==="Active")?.location}</div>
                </div>
                <button onClick={()=>setActiveTab("sos")} style={{background:"#ef4444",color:"white",border:"none",borderRadius:"6px",padding:"8px 16px",fontWeight:"700",fontSize:"12px"}}>View SOS →</button>
              </div>
            )}
          </div>
        )}

        {activeTab==="reports"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"24px",flexWrap:"wrap",gap:"12px"}}>
              <div>
                <h1 style={{fontSize:"24px",fontWeight:"800",color:"#0f172a"}}>All Reports</h1>
                <p style={{color:"#64748b",fontSize:"13px"}}>{filteredReports.length} reports found</p>
              </div>
              <button style={{background:"#0f172a",color:"white",border:"none",borderRadius:"8px",padding:"9px 18px",fontWeight:"600",fontSize:"13px"}}>⬇ Export CSV</button>
            </div>
            <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"10px",padding:"16px 20px",marginBottom:"16px"}}>
              <div style={{display:"flex",gap:"20px",flexWrap:"wrap"}}>
                <div>
                  <div style={{fontSize:"11px",color:"#94a3b8",fontWeight:"700",marginBottom:"6px"}}>CRIME TYPE</div>
                  <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                    {["All","Theft/Robbery","Assault","Kidnapping","Drug Related"].map(f=>(
                      <button key={f} onClick={()=>setFilterType(f)} style={{padding:"4px 10px",border:filterType===f?"none":"1px solid #e2e8f0",borderRadius:"16px",fontSize:"11px",fontWeight:"600",background:filterType===f?"#4c1d95":"white",color:filterType===f?"white":"#64748b"}}>{f}</button>
                    ))}
                  </div>
                </div>
                <div>
                  <div style={{fontSize:"11px",color:"#94a3b8",fontWeight:"700",marginBottom:"6px"}}>STATUS</div>
                  <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                    {statusFilters.map(f=>(
                      <button key={f} onClick={()=>setFilterStatus(f)} style={{padding:"4px 10px",border:filterStatus===f?"none":"1px solid #e2e8f0",borderRadius:"16px",fontSize:"11px",fontWeight:"600",background:filterStatus===f?"#0f172a":"white",color:filterStatus===f?"white":"#64748b"}}>{f}</button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
            <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",overflow:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:"700px"}}>
                <thead>
                  <tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
                    {["Report ID","Type","Urgency","Status","Location","Reporter","Officer","Time",""].map(h=>(
                      <th key={h} style={{padding:"12px 14px",textAlign:"left",fontSize:"11px",fontWeight:"700",color:"#94a3b8",letterSpacing:"0.5px",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filteredReports.map((r,i)=>(
                    <tr key={r.id} style={{borderBottom:"1px solid #f1f5f9",background:i%2===0?"white":"#fafafa"}}>
                      <td style={{padding:"12px 14px",fontWeight:"700",fontSize:"13px",color:"#0f172a",whiteSpace:"nowrap"}}>{r.id}</td>
                      <td style={{padding:"12px 14px",fontSize:"13px",color:"#374151",whiteSpace:"nowrap"}}>{r.type}</td>
                      <td style={{padding:"12px 14px",whiteSpace:"nowrap"}}><Badge label={r.urgency} color={URGENCY_COLOR[r.urgency]} bg={URGENCY_COLOR[r.urgency]+"20"}/></td>
                      <td style={{padding:"12px 14px",whiteSpace:"nowrap"}}><Badge label={r.status} color={STATUS_COLOR[r.status]} bg={STATUS_BG[r.status]}/></td>
                      <td style={{padding:"12px 14px",fontSize:"12px",color:"#64748b",whiteSpace:"nowrap"}}>{r.location}</td>
                      <td style={{padding:"12px 14px",fontSize:"12px",color:"#64748b",whiteSpace:"nowrap"}}>{r.reporter==="Anonymous"?"🔒 Anon":r.reporter}</td>
                      <td style={{padding:"12px 14px",fontSize:"12px",color:"#64748b",whiteSpace:"nowrap"}}>{r.officer||"—"}</td>
                      <td style={{padding:"12px 14px",fontSize:"12px",color:"#94a3b8",whiteSpace:"nowrap"}}>{r.time}</td>
                      <td style={{padding:"12px 14px"}}><button onClick={()=>setSelectedReport(r)} style={{background:"#f1f5f9",color:"#374151",border:"none",borderRadius:"6px",padding:"5px 12px",fontSize:"12px",fontWeight:"600"}}>View</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {activeTab==="officers"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"24px",flexWrap:"wrap",gap:"12px"}}>
              <div>
                <h1 style={{fontSize:"24px",fontWeight:"800",color:"#0f172a"}}>Officer Management</h1>
                <p style={{color:"#64748b",fontSize:"13px"}}>{MOCK_OFFICERS.length} officers registered</p>
              </div>
              <button style={{background:"#4c1d95",color:"white",border:"none",borderRadius:"8px",padding:"9px 18px",fontWeight:"600",fontSize:"13px"}}>+ Add Officer</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
              {MOCK_OFFICERS.map(o=>(
                <div key={o.id} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"18px 22px",display:"flex",alignItems:"center",gap:"16px",flexWrap:"wrap"}}>
                  <div style={{width:"46px",height:"46px",background:o.status==="Off Duty"?"#f1f5f9":"#1d4ed8",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:0}}>👮</div>
                  <div style={{flex:1,minWidth:"160px"}}>
                    <div style={{fontWeight:"700",fontSize:"15px",color:"#0f172a"}}>{o.name}</div>
                    <div style={{fontSize:"12px",color:"#64748b"}}>{o.rank} • {o.station} • {o.id}</div>
                  </div>
                  <div style={{display:"flex",gap:"20px",alignItems:"center",flexWrap:"wrap"}}>
                    <div style={{textAlign:"center"}}><div style={{fontSize:"16px",fontWeight:"800",color:"#0f172a"}}>{o.cases}</div><div style={{fontSize:"10px",color:"#94a3b8"}}>Active</div></div>
                    <div style={{textAlign:"center"}}><div style={{fontSize:"16px",fontWeight:"800",color:"#22c55e"}}>{o.resolved}</div><div style={{fontSize:"10px",color:"#94a3b8"}}>Resolved</div></div>
                    <Badge label={o.status} color={o.status==="On Duty"?"#22c55e":o.status==="On Scene"?"#f97316":"#94a3b8"} bg={o.status==="On Duty"?"#f0fdf4":o.status==="On Scene"?"#fff7ed":"#f8fafc"}/>
                    <div style={{display:"flex",gap:"6px"}}>
                      <button style={{background:"#f1f5f9",border:"none",borderRadius:"6px",padding:"6px 12px",fontSize:"12px",fontWeight:"600",color:"#374151"}}>Assign Case</button>
                      <button style={{background:"#fee2e2",border:"none",borderRadius:"6px",padding:"6px 12px",fontSize:"12px",fontWeight:"600",color:"#dc2626"}}>Suspend</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {activeTab==="heatmap"&&(
          <div>
            <h1 style={{fontSize:"24px",fontWeight:"800",color:"#0f172a",marginBottom:"6px"}}>Crime Heatmap</h1>
            <p style={{color:"#64748b",fontSize:"13px",marginBottom:"24px"}}>Anonymized incident clusters — Lagos State</p>
            <div style={{background:"#0f172a",borderRadius:"16px",padding:"32px",minHeight:"420px",position:"relative",overflow:"hidden"}}>
              <div style={{textAlign:"center",color:"#475569",marginBottom:"16px",fontSize:"12px",letterSpacing:"1px"}}>LAGOS STATE — INCIDENT DENSITY MAP</div>
              {[{label:"Ikeja",top:"30%",left:"42%",intensity:"#ef4444",count:12},{label:"VI",top:"65%",left:"70%",intensity:"#f97316",count:8},{label:"Surulere",top:"50%",left:"35%",intensity:"#f59e0b",count:5},{label:"Lekki",top:"60%",left:"80%",intensity:"#f97316",count:7},{label:"Agege",top:"22%",left:"25%",intensity:"#f59e0b",count:4},{label:"Yaba",top:"45%",left:"48%",intensity:"#22c55e",count:2},{label:"Oshodi",top:"38%",left:"30%",intensity:"#ef4444",count:9}].map(z=>(
                <div key={z.label} style={{position:"absolute",top:z.top,left:z.left,transform:"translate(-50%,-50%)"}}>
                  <div style={{width:"60px",height:"60px",borderRadius:"50%",background:z.intensity+"40",border:`2px solid ${z.intensity}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                    <div style={{fontSize:"14px",fontWeight:"800",color:z.intensity}}>{z.count}</div>
                  </div>
                  <div style={{textAlign:"center",fontSize:"10px",color:"#94a3b8",marginTop:"4px"}}>{z.label}</div>
                </div>
              ))}
              <div style={{position:"absolute",bottom:"20px",right:"20px",background:"#1e293b",borderRadius:"8px",padding:"12px 16px"}}>
                <div style={{fontSize:"10px",color:"#94a3b8",fontWeight:"700",marginBottom:"8px"}}>INTENSITY</div>
                {[["#ef4444","High (9-15)"],["#f97316","Medium (5-8)"],["#f59e0b","Low (3-4)"],["#22c55e","Minimal (1-2)"]].map(([c,l])=>(
                  <div key={l} style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>
                    <div style={{width:"10px",height:"10px",borderRadius:"50%",background:c,flexShrink:0}}></div>
                    <span style={{fontSize:"11px",color:"#94a3b8"}}>{l}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"12px",marginTop:"20px"}}>
              {[{zone:"Ikeja",reports:12,trend:"↑ +3",color:"#ef4444"},{zone:"Oshodi",reports:9,trend:"↑ +1",color:"#ef4444"},{zone:"Victoria Island",reports:8,trend:"→ 0",color:"#f97316"},{zone:"Lekki",reports:7,trend:"↓ -2",color:"#f97316"}].map(z=>(
                <div key={z.zone} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"10px",padding:"14px 16px",borderLeft:`4px solid ${z.color}`}}>
                  <div style={{fontWeight:"700",fontSize:"13px",color:"#0f172a"}}>{z.zone}</div>
                  <div style={{fontSize:"22px",fontWeight:"800",color:z.color}}>{z.reports}</div>
                  <div style={{fontSize:"12px",color:"#94a3b8"}}>{z.trend} this week</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {activeTab==="sos"&&(
          <div>
            <h1 style={{fontSize:"24px",fontWeight:"800",color:"#0f172a",marginBottom:"6px"}}>SOS Incident Log</h1>
            <p style={{color:"#64748b",fontSize:"13px",marginBottom:"24px"}}>All panic button activations with timestamps</p>
            <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
              {MOCK_SOS.map(s=>(
                <div key={s.id} style={{background:s.status==="Active"?"#fff1f2":"white",border:`1px solid ${s.status==="Active"?"#fecdd3":"#e2e8f0"}`,borderRadius:"12px",padding:"20px 24px",borderLeft:`4px solid ${s.status==="Active"?"#ef4444":"#22c55e"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px",flexWrap:"wrap",gap:"8px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
                      <span style={{fontWeight:"800",fontSize:"15px"}}>{s.id}</span>
                      <Badge label={s.status} color={s.status==="Active"?"#ef4444":"#22c55e"} bg={s.status==="Active"?"#fee2e2":"#f0fdf4"}/>
                      {s.recorded&&<Badge label="🎙️ Recorded" color="#7c3aed" bg="#f5f3ff"/>}
                    </div>
                    <span style={{fontSize:"12px",color:"#94a3b8"}}>{s.time}</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",fontSize:"13px",marginBottom:s.status==="Active"?"12px":"0"}}>
                    <span style={{color:"#374151"}}>📍 {s.location}</span>
                    <span style={{color:"#374151"}}>📞 {s.reporter}</span>
                  </div>
                  {s.status==="Active"&&(
                    <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                      <button style={{background:"#ef4444",color:"white",border:"none",borderRadius:"6px",padding:"8px 16px",fontWeight:"700",fontSize:"12px"}}>Dispatch Now</button>
                      <button style={{background:"white",color:"#374151",border:"1px solid #d1d5db",borderRadius:"6px",padding:"8px 16px",fontWeight:"600",fontSize:"12px"}}>Live Location</button>
                      <button style={{background:"white",color:"#374151",border:"1px solid #d1d5db",borderRadius:"6px",padding:"8px 16px",fontWeight:"600",fontSize:"12px"}}>Play Recording</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {activeTab==="broadcast"&&(
          <div>
            <h1 style={{fontSize:"24px",fontWeight:"800",color:"#0f172a",marginBottom:"6px"}}>Broadcast Alerts</h1>
            <p style={{color:"#64748b",fontSize:"13px",marginBottom:"24px"}}>Send push notifications to citizens by region</p>
            <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"16px",padding:"28px 32px",maxWidth:"560px",marginBottom:"28px"}}>
              <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"6px"}}>Target Region</label>
              <select style={{width:"100%",padding:"11px 14px",border:"1px solid #d1d5db",borderRadius:"8px",fontSize:"14px",marginBottom:"18px",background:"white"}}>
                <option>All Lagos State</option><option>Ikeja Division</option><option>Victoria Island Division</option><option>Surulere Division</option><option>Lekki Division</option>
              </select>
              <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"8px"}}>Alert Type</label>
              <div style={{display:"flex",gap:"8px",marginBottom:"18px"}}>
                {[["🔴","Emergency"],["🟡","Warning"],["🔵","Information"]].map(([ico,lbl])=>(
                  <button key={lbl} style={{flex:1,padding:"10px",border:"1px solid #d1d5db",borderRadius:"8px",background:"white",fontSize:"13px",fontWeight:"600"}}>{ico} {lbl}</button>
                ))}
              </div>
              <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"6px"}}>Message</label>
              <textarea value={broadcastMsg} onChange={e=>setBroadcastMsg(e.target.value)} placeholder="Type your public safety alert here..."
                style={{width:"100%",minHeight:"100px",padding:"12px 14px",border:"1px solid #d1d5db",borderRadius:"8px",fontSize:"13px",resize:"vertical",outline:"none",fontFamily:"inherit",marginBottom:"18px"}}/>
              <button onClick={handleBroadcast} style={{width:"100%",background:broadcasted?"#22c55e":"#4c1d95",color:"white",border:"none",borderRadius:"8px",padding:"13px",fontWeight:"700",fontSize:"14px",transition:"background 0.3s"}}>
                {broadcasted?"✓ Broadcast Sent!":"📢 Send Broadcast"}
              </button>
            </div>
            <div>
              <div style={{fontWeight:"700",fontSize:"14px",color:"#0f172a",marginBottom:"12px"}}>Recent Broadcasts</div>
              {[{msg:"Road closure on Eko Bridge due to incident. Use alternative routes.",time:"Today 10:22",region:"All Lagos"},{msg:"Avoid Oshodi underbridge area. Police operation in progress.",time:"Yesterday 18:04",region:"Oshodi"}].map((b,i)=>(
                <div key={i} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"10px",padding:"14px 18px",marginBottom:"10px"}}>
                  <div style={{fontSize:"13px",color:"#374151",marginBottom:"6px"}}>{b.msg}</div>
                  <div style={{fontSize:"11px",color:"#94a3b8"}}>{b.time} • {b.region}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {activeTab==="analytics"&&(
          <div>
            <h1 style={{fontSize:"24px",fontWeight:"800",color:"#0f172a",marginBottom:"6px"}}>Analytics & Reports</h1>
            <p style={{color:"#64748b",fontSize:"13px",marginBottom:"24px"}}>Performance metrics and trend analysis</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"20px",marginBottom:"24px"}}>
              <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"20px 24px"}}>
                <div style={{fontWeight:"700",fontSize:"14px",color:"#0f172a",marginBottom:"16px"}}>Reports by Crime Type</div>
                {[["Theft/Robbery",35,"#ef4444"],["Assault",22,"#f97316"],["Drug Related",18,"#f59e0b"],["Vandalism",14,"#3b82f6"],["Fraud/Scam",11,"#8b5cf6"]].map(([lbl,pct,color])=>(
                  <div key={lbl} style={{marginBottom:"10px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",marginBottom:"4px"}}>
                      <span style={{color:"#374151"}}>{lbl}</span>
                      <span style={{fontWeight:"700",color:"#0f172a"}}>{pct}%</span>
                    </div>
                    <div style={{background:"#f1f5f9",borderRadius:"4px",height:"6px"}}>
                      <div style={{background:color,width:`${pct}%`,height:"6px",borderRadius:"4px"}}></div>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"20px 24px"}}>
                <div style={{fontWeight:"700",fontSize:"14px",color:"#0f172a",marginBottom:"16px"}}>Response Time by Urgency</div>
                {[["Critical","4 min","#ef4444",90],["High","8 min","#f97316",70],["Medium","15 min","#f59e0b",50],["Low","32 min","#22c55e",30]].map(([lbl,time,color,pct])=>(
                  <div key={lbl} style={{marginBottom:"12px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",marginBottom:"4px"}}>
                      <span style={{color:"#374151"}}>{lbl}</span>
                      <span style={{fontWeight:"700",color}}>{time} avg</span>
                    </div>
                    <div style={{background:"#f1f5f9",borderRadius:"4px",height:"6px"}}>
                      <div style={{background:color,width:`${pct}%`,height:"6px",borderRadius:"4px"}}></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"20px 24px",marginBottom:"20px"}}>
              <div style={{fontWeight:"700",fontSize:"14px",color:"#0f172a",marginBottom:"16px"}}>Weekly Report Volume</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:"12px",height:"100px"}}>
                {[{day:"Mon",val:60},{day:"Tue",val:80},{day:"Wed",val:45},{day:"Thu",val:90},{day:"Fri",val:75},{day:"Sat",val:55},{day:"Sun",val:40}].map(d=>(
                  <div key={d.day} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"6px"}}>
                    <div style={{background:"#4c1d95",width:"100%",height:`${d.val}%`,borderRadius:"4px 4px 0 0",minHeight:"8px"}}></div>
                    <span style={{fontSize:"11px",color:"#94a3b8"}}>{d.day}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:"12px"}}>
              <button style={{background:"#0f172a",color:"white",border:"none",borderRadius:"8px",padding:"10px 20px",fontWeight:"600",fontSize:"13px"}}>⬇ Export PDF Report</button>
              <button style={{background:"white",color:"#374151",border:"1px solid #d1d5db",borderRadius:"8px",padding:"10px 20px",fontWeight:"600",fontSize:"13px"}}>⬇ Export CSV</button>
            </div>
          </div>
        )}

        {activeTab==="vault"&&(
          <div>
            <h1 style={{fontSize:"24px",fontWeight:"800",color:"#0f172a",marginBottom:"6px"}}>Evidence Vault</h1>
            <p style={{color:"#64748b",fontSize:"13px",marginBottom:"20px"}}>Tamper-proof forensic media with full audit trail</p>
            <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:"10px",padding:"12px 16px",marginBottom:"20px",fontSize:"13px",color:"#92400e"}}>
              🔐 All evidence is AES-256 encrypted. Access is logged and audited. Unauthorized access is a federal offense.
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"14px",marginBottom:"24px"}}>
              {[{id:"RPT-001",type:"Photo",count:2,size:"4.2 MB",sealed:true},{id:"RPT-002",type:"Video",count:1,size:"28 MB",sealed:true},{id:"RPT-003",type:"Photo",count:3,size:"6.8 MB",sealed:false},{id:"RPT-006",type:"Photo",count:2,size:"3.1 MB",sealed:true}].map(e=>(
                <div key={e.id} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"18px 20px"}}>
                  <div style={{fontSize:"28px",marginBottom:"10px"}}>{e.type==="Photo"?"🖼️":"🎥"}</div>
                  <div style={{fontWeight:"700",fontSize:"14px",color:"#0f172a",marginBottom:"4px"}}>{e.id}</div>
                  <div style={{fontSize:"12px",color:"#64748b",marginBottom:"8px"}}>{e.count} file(s) • {e.size}</div>
                  <Badge label={e.sealed?"🔏 Sealed":"🔓 Accessible"} color={e.sealed?"#7c3aed":"#374151"} bg={e.sealed?"#f5f3ff":"#f8fafc"}/>
                  <button style={{background:"#f1f5f9",border:"none",borderRadius:"6px",padding:"6px 14px",fontSize:"12px",fontWeight:"600",color:"#374151",width:"100%",marginTop:"12px"}}>View with Audit Log</button>
                </div>
              ))}
            </div>
            <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"20px 24px"}}>
              <div style={{fontWeight:"700",fontSize:"14px",color:"#0f172a",marginBottom:"14px"}}>Recent Audit Trail</div>
              {[{action:"Evidence accessed",user:"Admin",report:"RPT-003",time:"Today 11:04"},{action:"Evidence sealed",user:"System",report:"RPT-001",time:"Today 09:21"},{action:"New evidence uploaded",user:"Sgt. Adebayo",report:"RPT-006",time:"Yesterday 17:45"},{action:"Evidence viewed",user:"Insp. Bello",report:"RPT-002",time:"Yesterday 14:12"}].map((a,i)=>(
                <div key={i} style={{display:"flex",gap:"12px",padding:"10px 0",borderBottom:"1px solid #f1f5f9",fontSize:"12px",flexWrap:"wrap"}}>
                  <span style={{color:"#94a3b8",whiteSpace:"nowrap"}}>{a.time}</span>
                  <span style={{fontWeight:"600",color:"#0f172a"}}>{a.action}</span>
                  <span style={{color:"#64748b"}}>by {a.user}</span>
                  <span style={{color:"#3b82f6",marginLeft:"auto"}}>{a.report}</span>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>
      {selectedReport&&<ReportDetailModal report={selectedReport} onClose={()=>setSelectedReport(null)} onStatusChange={updateStatus} isAdmin={true}/>}
    </div>
  );
}

// ── ROOT APP ───────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("home");
  const [loginModal,setLoginModal]=useState(null);
  return(
    <div>
      {view!=="police"&&view!=="admin"&&(
        <Navbar
          onHome={()=>setView("home")}
          onReportCrime={()=>setView("report")}
          onMyReports={()=>setView("myreports")}
          onPoliceLogin={()=>setLoginModal("police")}
          onAdminLogin={()=>setLoginModal("admin")}
        />
      )}
      {view==="home"&&<HomePage onReportCrime={()=>setView("report")}/>}
      {view==="report"&&<ReportForm onSuccess={()=>setView("success")} onCancel={()=>setView("home")}/>}
      {view==="success"&&<SuccessScreen onDashboard={()=>setView("home")}/>}
      {view==="myreports"&&<MyReportsPage/>}
      {view==="police"&&<PolicePanel onLogout={()=>setView("home")}/>}
      {view==="admin"&&<AdminPanel onLogout={()=>setView("home")}/>}
      {loginModal&&<LoginModal role={loginModal} onSuccess={()=>{setView(loginModal);setLoginModal(null);}} onClose={()=>setLoginModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
