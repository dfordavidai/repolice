<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>RePolice – Secure Crime Reporting Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f8fafc;-webkit-font-smoothing:antialiased;padding-bottom:62px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
button{cursor:pointer;transition:opacity .15s,transform .1s;-webkit-tap-highlight-color:transparent;font-family:inherit}
button:hover{opacity:.88}
button:active{transform:scale(.97)}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.pro-search{width:100%;padding:11px 14px 11px 34px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;font-family:inherit;background:white}
.pro-search:focus{border-color:#1e3a5f}

/* ─ TICKER ─ */
.ticker-wrap{overflow:hidden;background:#0f172a;padding:7px 0;border-bottom:1px solid #1e293b}
.ticker-inner{display:flex;white-space:nowrap;animation:ticker 32s linear infinite}
.ticker-inner:hover{animation-play-state:paused}

/* ─ LAYOUT ─ */
.hero-row{display:flex;justify-content:space-between;align-items:flex-start;gap:32px;padding:52px 48px 36px}
.hero-btns{display:flex;gap:14px;margin-bottom:32px}
.hero-feats{display:flex;gap:14px}
.sec{padding:0 48px 44px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-zone{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:44px}
.community{background:#0f172a;margin:0 48px 0;border-radius:16px 16px 0 0;padding:40px 48px;text-align:center}

/* ─ NAVBAR ─ */
.nav-desktop{display:flex;align-items:center;gap:14px}
.nav-hamburger{display:none;background:none;border:none;color:white;font-size:22px;padding:4px 8px}

/* ─ BOTTOM NAV (sticky on all screens) ─ */
.bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#0f172a;border-top:1px solid #1e293b;padding:6px 0 env(safe-area-inset-bottom,6px);z-index:200}

/* ─ PANEL SIDEBAR ─ */
.panel-side{width:220px;flex-shrink:0}
.panel-tabbar{display:none;overflow-x:auto;background:inherit;scrollbar-width:none}
.panel-tabbar::-webkit-scrollbar{display:none}
.panel-main{flex:1;padding:32px;overflow-y:auto}

/* ─ FORM ─ */
.form-wrap{background:#f8fafc;min-height:calc(100vh - 60px);display:flex;justify-content:center;padding:40px 20px}
.form-card{background:white;border-radius:16px;border:1px solid #e2e8f0;padding:36px 38px;width:100%;max-width:520px;height:fit-content}

/* ─ FAB SOS ─ */
.fab{display:flex;position:fixed;bottom:72px;right:18px;background:#ef4444;color:white;border:none;border-radius:50%;width:54px;height:54px;font-size:22px;box-shadow:0 4px 20px rgba(239,68,68,.5);align-items:center;justify-content:center;z-index:150;animation:pulse 2s infinite}

/* ─ TABLE ─ */
.tbl-wrap{background:white;border:1px solid #e2e8f0;border-radius:12px;overflow-x:auto}

/* ─ MODAL ─ */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.58);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.modal-box{background:white;border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow:auto;box-shadow:0 25px 60px rgba(0,0,0,.3)}

/* ══ MOBILE BREAKPOINT ══ */
@media(max-width:768px){

  /* nav */
  .nav-desktop{display:none}
  .nav-hamburger{display:block}
  .bottom-nav{display:flex}

  /* hero — ultra compact */
  .hero-row{flex-direction:column;padding:16px 14px 12px;gap:12px}
  .hero-btns{flex-direction:row;gap:8px;margin-bottom:12px}
  .hero-btns button{flex:1!important;padding:12px 8px!important;font-size:13px!important}
  .hero-feats{display:none!important}
  .live-monitor-wrap{display:none!important}

  /* sections */
  .sec{padding:0 14px 18px}
  .grid3{grid-template-columns:1fr!important;gap:8px}
  .grid2{grid-template-columns:1fr!important;gap:8px}
  .grid-stats{grid-template-columns:1fr 1fr!important;gap:8px}
  .grid-zone{grid-template-columns:1fr 1fr!important;gap:8px}
  .how-grid{grid-template-columns:1fr!important;gap:8px;margin-bottom:18px}
  .community{margin:0;border-radius:0;padding:20px 14px}

  /* panel */
  .panel-side{display:none}
  .panel-tabbar{display:flex}
  .panel-main{padding:14px;padding-top:58px}

  /* form */
  .form-wrap{padding:0}
  .form-card{border-radius:0;border:none;min-height:calc(100vh - 60px);padding:20px 14px}

  /* modal slides up from bottom on mobile */
  .modal-backdrop{align-items:flex-end;padding:0}
  .modal-box{border-radius:16px 16px 0 0;max-height:92vh;max-width:100%}
}
</style>
</head>

/* ── LIVE RECORDER ── */
function LiveRecorder({compact=false,onRecorded}){
  const videoRef=useRef(null);
  const mediaRef=useRef(null);
  const chunksRef=useRef([]);
  const[state,setState]=useState("idle"); // idle | requesting | live | recorded | error
  const[elapsed,setElapsed]=useState(0);
  const[blobUrl,setBlobUrl]=useState(null);
  const timerRef=useRef(null);

  async function startCamera(){
    setState("requesting");
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
      videoRef.current.srcObject=stream;
      videoRef.current.play();
      setState("live");
      // start MediaRecorder
      const mr=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported("video/webm;codecs=vp9")?"video/webm;codecs=vp9":"video/webm"});
      mediaRef.current=mr;
      chunksRef.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=()=>{
        const blob=new Blob(chunksRef.current,{type:"video/webm"});
        const url=URL.createObjectURL(blob);
        setBlobUrl(url);
        setState("recorded");
        if(onRecorded)onRecorded(blob);
      };
      mr.start(500);
      // elapsed timer
      setElapsed(0);
      timerRef.current=setInterval(()=>setElapsed(p=>p+1),1000);
    }catch(e){setState("error");}
  }

  function stopRecording(){
    if(timerRef.current)clearInterval(timerRef.current);
    if(mediaRef.current&&mediaRef.current.state!=="inactive")mediaRef.current.stop();
    if(videoRef.current&&videoRef.current.srcObject){
      videoRef.current.srcObject.getTracks().forEach(t=>t.stop());
      videoRef.current.srcObject=null;
    }
  }

  function reset(){
    stopRecording();
    setBlobUrl(null);
    setElapsed(0);
    setState("idle");
  }

  function fmtTime(s){return`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;}

  if(compact){
    // Compact inline version for report form
    return(
      <div style={{border:"1px solid #e2e8f0",borderRadius:"10px",overflow:"hidden",marginBottom:"16px"}}>
        <div style={{background:"#0f172a",padding:"9px 13px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
            <span style={{fontSize:"13px"}}>🎥</span>
            <span style={{color:"white",fontWeight:"700",fontSize:"12px"}}>Live Video Evidence</span>
            <span style={{fontSize:"10px",background:"#1e293b",color:"#94a3b8",borderRadius:"4px",padding:"1px 6px",fontWeight:"600"}}>Optional</span>
          </div>
          {state==="live"&&<span style={{fontSize:"11px",color:"#ef4444",fontWeight:"700",display:"flex",alignItems:"center",gap:"4px"}}><span style={{width:"6px",height:"6px",borderRadius:"50%",background:"#ef4444",display:"inline-block",animation:"pulse 1s infinite"}}></span>REC {fmtTime(elapsed)}</span>}
          {state==="recorded"&&<span style={{fontSize:"11px",color:"#22c55e",fontWeight:"700"}}>✓ Saved {fmtTime(elapsed)}</span>}
        </div>
        <div style={{background:"#0f172a",position:"relative"}}>
          <video ref={videoRef} autoPlay muted playsInline style={{width:"100%",maxHeight:"160px",objectFit:"cover",display:state==="live"?"block":"none"}}/>
          {state==="recorded"&&blobUrl&&<video src={blobUrl} controls style={{width:"100%",maxHeight:"160px",objectFit:"cover"}}/>}
          {(state==="idle"||state==="requesting"||state==="error")&&(
            <div style={{minHeight:"80px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"14px",gap:"7px"}}>
              {state==="error"?<><span style={{fontSize:"22px"}}>🚫</span><p style={{color:"#94a3b8",fontSize:"11px",textAlign:"center"}}>Camera access denied. You can still submit without video.</p></>
              :<><span style={{fontSize:"22px",color:"#475569"}}>📷</span><p style={{color:"#94a3b8",fontSize:"11px"}}>No video attached yet</p></>}
            </div>
          )}
        </div>
        <div style={{padding:"8px 10px",background:"#f8fafc",display:"flex",gap:"6px"}}>
          {state==="idle"&&<button onClick={startCamera} style={{flex:1,background:"#ef4444",color:"white",border:"none",borderRadius:"7px",padding:"9px",fontWeight:"700",fontSize:"12px"}}>🔴 Start Recording</button>}
          {state==="requesting"&&<button disabled style={{flex:1,background:"#94a3b8",color:"white",border:"none",borderRadius:"7px",padding:"9px",fontWeight:"700",fontSize:"12px"}}>Requesting camera…</button>}
          {state==="live"&&<><button onClick={stopRecording} style={{flex:1,background:"#0f172a",color:"white",border:"none",borderRadius:"7px",padding:"9px",fontWeight:"700",fontSize:"12px"}}>⏹ Stop</button></>}
          {state==="recorded"&&<><a href={blobUrl} download="evidence.webm" style={{flex:1,background:"#22c55e",color:"white",border:"none",borderRadius:"7px",padding:"9px",fontWeight:"700",fontSize:"12px",textAlign:"center",textDecoration:"none"}}>⬇ Save</a><button onClick={reset} style={{background:"white",color:"#374151",border:"1px solid #d1d5db",borderRadius:"7px",padding:"9px 12px",fontWeight:"600",fontSize:"12px"}}>Re-record</button></>}
          {state==="error"&&<button onClick={()=>setState("idle")} style={{flex:1,background:"#f1f5f9",color:"#374151",border:"none",borderRadius:"7px",padding:"9px",fontWeight:"600",fontSize:"12px"}}>Try Again</button>}
        </div>
      </div>
    );
  }

  // Full homepage widget version
  return(
    <div style={{borderRadius:"12px",overflow:"hidden",border:"1px solid #e2e8f0",background:"white"}}>

          <span style={{fontSize:"15px"}}>🎥</span>
          <span style={{color:"white",fontWeight:"700",fontSize:"13px"}}>Live Incident Recorder</span>

          {state==="recorded"&&<span style={{color:"#22c55e",fontSize:"11px",fontWeight:"700"}}>✓ RECORDED</span>}
          {state==="idle"&&<span style={{color:"#475569",fontSize:"10px"}}>STANDBY</span>}
        </div>

      {/* Video viewport */}
      <div style={{background:"#020617",position:"relative",minHeight:"180px",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <video ref={videoRef} autoPlay muted playsInline style={{width:"100%",maxHeight:"220px",objectFit:"cover",display:state==="live"?"block":"none"}}/>

          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"8px",padding:"24px"}}>
            <div style={{width:"52px",height:"52px",borderRadius:"50%",border:"2px solid #1e293b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px"}}>📷</div>
            <p style={{color:"#475569",fontSize:"12px",textAlign:"center",lineHeight:1.5}}>Tap Record to capture live video evidence{"\n"}directly from the scene</p>
          </div>
        )}
        {state==="error"&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",padding:"20px"}}>

/* ── REPORT FORM ── */
function ReportForm({onSuccess,onCancel}){
  const m=useIsMobile();
  const[step,setStep]=useState(1);
  const[crimeType,setCrimeType]=useState("Theft/Robbery");
  const[urgency,setUrgency]=useState("Low (Non-emergency)");
  const[description,setDescription]=useState("");
  const[anonymous,setAnonymous]=useState(false);
  const[submitting,setSubmitting]=useState(false);
  async function submit(){setSubmitting(true);await new Promise(r=>setTimeout(r,1800));onSuccess();}
  return(
    <div className="form-wrap">
      <div className="form-card">
        <StepBar step={step}/>
        {step===1&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
              <h2 style={{fontSize:"20px",fontWeight:"800",color:"#0f172a"}}>Incident Details</h2>
              <button onClick={onCancel} style={{background:"none",border:"none",color:"#94a3b8",fontSize:"14px"}}>Cancel</button>
            </div>
            <p style={{fontSize:"12px",color:"#94a3b8",marginBottom:"18px"}}>Step 1 of 3</p>
            <div onClick={()=>setAnonymous(!anonymous)} style={{display:"flex",alignItems:"center",gap:"10px",background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:"8px",padding:"12px 13px",marginBottom:"16px",cursor:"pointer"}}>
              <div style={{width:"20px",height:"20px",borderRadius:"5px",border:anonymous?"none":"2px solid #d1d5db",background:anonymous?"#22c55e":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {anonymous&&<span style={{color:"white",fontSize:"13px",lineHeight:1}}>✓</span>}
              </div>
              <span style={{fontSize:"13px",fontWeight:"600",color:"#166534"}}>🔒 File Anonymously — identity hidden</span>
            </div>
            <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"5px"}}>Type of Crime</label>
            <select value={crimeType} onChange={e=>setCrimeType(e.target.value)} style={{width:"100%",padding:"13px 12px",border:"1px solid #d1d5db",borderRadius:"8px",fontSize:"15px",marginBottom:"16px",background:"white",outline:"none"}}>
              {["Theft/Robbery","Assault","Vandalism","Fraud/Scam","Kidnapping","Drug Related","Cybercrime","Murder/Attempted Murder","Other"].map(o=><option key={o}>{o}</option>)}
            </select>
            <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"7px"}}>Urgency Level</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"16px"}}>
              {["Low (Non-emergency)","Medium","High (Emergency)","Critical (Life-threatening)"].map(opt=>(
                <button key={opt} onClick={()=>setUrgency(opt)} style={{padding:"12px 8px",border:urgency===opt?"none":"1px solid #d1d5db",borderRadius:"8px",background:urgency===opt?"#0f172a":"white",color:urgency===opt?"white":"#374151",fontWeight:urgency===opt?"700":"500",fontSize:"12px",lineHeight:1.3}}>{opt}</button>
              ))}
            </div>
            <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"5px"}}>Detailed Description</label>
            <textarea value={description} onChange={e=>setDescription(e.target.value)} placeholder="Describe what happened, who was involved, and any specific details..."
              style={{width:"100%",minHeight:"96px",padding:"12px 13px",border:description?"2px solid #f59e0b":"1px solid #d1d5db",borderRadius:"8px",fontSize:"15px",resize:"vertical",outline:"none",fontFamily:"inherit",marginBottom:"20px"}}/>
            <button onClick={()=>setStep(2)} style={{width:"100%",background:"#0f172a",color:"white",border:"none",borderRadius:"8px",padding:"15px",fontWeight:"700",fontSize:"15px"}}>Continue →</button>
          </div>
        )}
        {step===2&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
              <h2 style={{fontSize:"20px",fontWeight:"800",color:"#0f172a"}}>Location & Evidence</h2>
              <button onClick={onCancel} style={{background:"none",border:"none",color:"#94a3b8",fontSize:"14px"}}>Cancel</button>
            </div>
            <p style={{fontSize:"12px",color:"#94a3b8",marginBottom:"18px"}}>Step 2 of 3</p>
            <div style={{border:"1px solid #e2e8f0",borderRadius:"10px",padding:"14px",marginBottom:"16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px",gap:"8px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                  <span style={{fontSize:"20px"}}>📍</span>
                  <div><div style={{fontWeight:"700",fontSize:"14px"}}>Incident Location</div><div style={{fontSize:"11px",color:"#94a3b8"}}>Auto-captured via GPS</div></div>
                </div>
                <button style={{background:"white",border:"1px solid #d1d5db",borderRadius:"6px",padding:"7px 11px",fontSize:"12px",fontWeight:"600",whiteSpace:"nowrap",flexShrink:0}}>Update GPS</button>
              </div>
              <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:"6px",padding:"10px 12px",fontSize:"13px",color:"#94a3b8",fontStyle:"italic"}}>Location not yet captured</div>
            </div>
            <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"7px"}}>Media Evidence <span style={{color:"#94a3b8",fontWeight:"400"}}>(optional)</span></label>
            <LiveRecorder compact={true}/>
            <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"7px"}}>Or Upload Photos/Videos</label>
            <div style={{border:"2px dashed #d1d5db",borderRadius:"10px",padding:"34px 20px",display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",marginBottom:"22px",background:"#fafafa"}}>
              <span style={{fontSize:"30px",color:"#d1d5db"}}>📷</span>
              <div style={{fontSize:"13px",color:"#9ca3af",marginTop:"8px",fontWeight:"600"}}>Tap to add photos or videos</div>
              <div style={{fontSize:"11px",color:"#cbd5e1",marginTop:"3px"}}>JPG, PNG, MP4 supported</div>
            </div>
            <div style={{display:"flex",gap:"10px"}}>
              <button onClick={()=>setStep(1)} style={{background:"white",color:"#374151",border:"1px solid #d1d5db",borderRadius:"8px",padding:"15px 18px",fontWeight:"600",fontSize:"14px"}}>← Back</button>
              <button onClick={()=>setStep(3)} style={{flex:1,background:"#0f172a",color:"white",border:"none",borderRadius:"8px",padding:"15px",fontWeight:"700",fontSize:"15px"}}>Continue →</button>
            </div>
          </div>
        )}
        {step===3&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
              <h2 style={{fontSize:"20px",fontWeight:"800",color:"#0f172a"}}>Final Review</h2>
              <button onClick={onCancel} style={{background:"none",border:"none",color:"#94a3b8",fontSize:"14px"}}>Cancel</button>
            </div>
            <p style={{fontSize:"12px",color:"#94a3b8",marginBottom:"18px"}}>Step 3 of 3</p>
            <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:"10px",padding:"17px 18px",marginBottom:"16px"}}>
              <div style={{fontWeight:"700",fontSize:"14px",marginBottom:"12px"}}>📋 Report Summary</div>
              {[["Crime Type",crimeType],["Urgency",urgency],["Identity",anonymous?"🔒 Anonymous":"👤 Identified"],["Location","Manual"],["Media Files","0 attached"]].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:"9px",gap:"10px"}}>
                  <span style={{fontSize:"13px",color:"#64748b"}}>{k}</span>
                  <span style={{fontSize:"13px",fontWeight:"700",color:"#0f172a",textAlign:"right"}}>{v}</span>
                </div>
              ))}
            </div>
            <p style={{fontSize:"12px",color:"#94a3b8",fontStyle:"italic",lineHeight:1.6,marginBottom:"20px"}}>"I hereby certify that the information provided is accurate. I understand that filing a false police report is a punishable offense."</p>

              <button onClick={()=>setStep(2)} style={{background:"white",color:"#374151",border:"1px solid #d1d5db",borderRadius:"8px",padding:"15px 18px",fontWeight:"600",fontSize:"14px"}}>← Back</button>
              <button onClick={submit} disabled={submitting} style={{flex:1,background:submitting?"#86efac":"#0f172a",color:"white",border:"none",borderRadius:"8px",padding:"15px",fontWeight:"700",fontSize:"15px",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}>
                {submitting?<><span style={{width:"14px",height:"14px",border:"2px solid rgba(255,255,255,.4)",borderTop:"2px solid white",borderRadius:"50%",animation:"spin .7s linear infinite",display:"inline-block"}}></span>Submitting...</>:"✅ Confirm & Send"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );

/* ── LOGIN MODAL ── */
function LoginModal({role,onSuccess,onClose}){
  const[badge,setBadge]=useState("");const[otp,setOtp]=useState("");
  const[step,setStep]=useState(1);const[loading,setLoading]=useState(false);const[error,setError]=useState("");
  const C=role==="police"?{badge:"LG-4421",otp:"112112"}:{badge:"ADMIN-01",otp:"999999"};
  async function hBadge(){if(!badge){setError("Enter your ID");return;}setLoading(true);setError("");await new Promise(r=>setTimeout(r,700));setLoading(false);if(badge.toUpperCase()!==C.badge){setError("ID not found");return;}setStep(2);}
  async function hOtp(){if(!otp){setError("Enter OTP");return;}setLoading(true);setError("");await new Promise(r=>setTimeout(r,700));setLoading(false);if(otp!==C.otp){setError("Invalid OTP — try "+C.otp);return;}onSuccess();}
  return(
    <Modal onClose={onClose}>
      <div style={{padding:"28px 24px"}}>
        <div style={{fontSize:"30px",marginBottom:"6px"}}>{role==="police"?"👮":"🛡️"}</div>
        <h2 style={{fontSize:"19px",fontWeight:"800",color:"#0f172a",marginBottom:"3px"}}>{role==="police"?"Police Officer Login":"Admin Panel Login"}</h2>
        <p style={{fontSize:"13px",color:"#94a3b8",marginBottom:"22px"}}>{step===1?`Enter your ${role==="police"?"Badge ID":"Admin ID"}`:"Enter OTP sent to your registered number"}</p>
        {step===1?(
          <>
            <label style={{fontSize:"13px",fontWeight:"600",color:"#374151",display:"block",marginBottom:"5px"}}>{role==="police"?"Badge ID":"Admin ID"}</label>
            <input value={badge} onChange={e=>setBadge(e.target.value)} placeholder={role==="police"?"e.g. LG-4421":"e.g. ADMIN-01"}
              style={{width:"100%",padding:"13px 13px",border:"1px solid #d1d5db",borderRadius:"8px",fontSize:"15px",marginBottom:"7px",outline:"none"}}/>
            {error&&<p style={{color:"#ef4444",fontSize:"12px",marginBottom:"7px"}}>{error}</p>}
            <p style={{fontSize:"11px",color:"#94a3b8",marginBottom:"18px"}}>Demo: <strong>{C.badge}</strong></p>
            <button onClick={hBadge} style={{width:"100%",background:"#0f172a",color:"white",border:"none",borderRadius:"8px",padding:"14px",fontWeight:"700",fontSize:"14px"}}>{loading?"Verifying...":"Continue"}</button>
          </>
        ):(
          <>
            <label style={{fontSize:"13px",fontWeight:"600",color:"#374151",display:"block",marginBottom:"5px"}}>OTP Code</label>
            <input value={otp} onChange={e=>setOtp(e.target.value)} placeholder="6-digit OTP"
              style={{width:"100%",padding:"13px",border:"1px solid #d1d5db",borderRadius:"8px",fontSize:"20px",marginBottom:"7px",outline:"none",letterSpacing:"10px",textAlign:"center"}}/>
            {error&&<p style={{color:"#ef4444",fontSize:"12px",marginBottom:"7px"}}>{error}</p>}
            <p style={{fontSize:"11px",color:"#94a3b8",marginBottom:"18px"}}>Demo OTP: <strong>{C.otp}</strong></p>
            <button onClick={hOtp} style={{width:"100%",background:role==="police"?"#1d4ed8":"#7c3aed",color:"white",border:"none",borderRadius:"8px",padding:"14px",fontWeight:"700",fontSize:"14px"}}>{loading?"Authenticating...":"Login"}</button>
          </>
        )}
        <button onClick={onClose} style={{width:"100%",background:"none",border:"none",color:"#94a3b8",fontSize:"13px",marginTop:"10px",padding:"8px"}}>Cancel</button>
      </div>
    </Modal>
  );
}

  const flow=["Submitted","Assigned","En Route","On Scene","Investigating","Resolved"];
  return(

        </div>
        <div style={{background:"#f8fafc",borderRadius:"8px",padding:"11px 13px",marginBottom:"14px"}}>
          <div style={{fontWeight:"600",fontSize:"10px",color:"#64748b",marginBottom:"4px"}}>DESCRIPTION</div>
          <p style={{fontSize:"13px",color:"#374151",lineHeight:1.6}}>{report.description}</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"7px",marginBottom:"14px"}}>

        <div style={{marginBottom:"14px"}}>
          <div style={{fontWeight:"600",fontSize:"10px",color:"#64748b",marginBottom:"7px"}}>UPDATE STATUS</div>
          <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
            {flow.map(s=>(
              <button key={s} onClick={()=>hStatus(s)} style={{padding:"5px 10px",border:"none",borderRadius:"16px",fontSize:"11px",fontWeight:"600",background:status===s?SC[s]:"#f1f5f9",color:status===s?"white":"#64748b"}}>{s}</button>
            ))}
          </div>
        </div>
        <div>
          <div style={{fontWeight:"600",fontSize:"10px",color:"#64748b",marginBottom:"7px"}}>CASE NOTES</div>
          <div style={{background:"#f8fafc",borderRadius:"8px",padding:"9px 11px",marginBottom:"7px",maxHeight:"90px",overflowY:"auto"}}>

  return(
    <div style={{display:"flex",minHeight:"calc(100vh - 60px)",background:"#f0f4f8"}}>
      <div className="panel-side" style={{background:"#4c1d95",padding:"22px 14px",display:"flex",flexDirection:"column",gap:"3px"}}>
        <div style={{color:"white",fontWeight:"800",fontSize:"13px",marginBottom:"2px",paddingLeft:"7px"}}>ADMIN PANEL</div>
        <div style={{color:"#c4b5fd",fontSize:"11px",paddingLeft:"7px",marginBottom:"18px"}}>Super Administrator</div>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?"rgba(255,255,255,.15)":"none",border:"none",color:tab===t.id?"white":"#c4b5fd",borderRadius:"8px",padding:"10px 11px",textAlign:"left",fontSize:"13px",fontWeight:tab===t.id?"700":"500",display:"flex",alignItems:"center",gap:"7px"}}>
            {t.icon} {t.label}
          </button>
        ))}
        <div style={{marginTop:"auto"}}><button onClick={onLogout} style={{background:"rgba(255,255,255,.1)",border:"none",color:"#c4b5fd",borderRadius:"8px",padding:"10px 11px",width:"100%",textAlign:"left",fontSize:"13px"}}>🚪 Logout</button></div>
      </div>
      {/* Mobile tab bar */}
      <div style={{position:"fixed",top:"60px",left:0,right:0,zIndex:90,background:"#4c1d95",borderBottom:"1px solid #6d28d9"}}>
        <div className="panel-tabbar">
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",color:tab===t.id?"white":"#c4b5fd",padding:"10px 13px",fontSize:"11px",fontWeight:tab===t.id?"700":"500",whiteSpace:"nowrap",borderBottom:tab===t.id?"3px solid #f59e0b":"3px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:"1px",flexShrink:0}}>
              <span style={{fontSize:"15px"}}>{t.icon}</span><span>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
      <div className="panel-main" style={{paddingTop:m?"62px":"32px"}}>
        {tab==="dashboard"&&(
          <div>
            <h1 style={{fontSize:m?"19px":"23px",fontWeight:"800",color:"#0f172a",marginBottom:"3px"}}>Command Dashboard</h1>
            <p style={{color:"#64748b",fontSize:"12px",marginBottom:"20px"}}>Real-time overview — Lagos State</p>
            <div className="grid-stats" style={{marginBottom:"18px"}}>
              <StatCard icon="📋" label="Total Reports" value={st.total} accent="#3b82f6"/>
              <StatCard icon="🔴" label="Active" value={st.active} accent="#ef4444"/>
              <StatCard icon="🚨" label="Critical" value={st.critical} accent="#f97316"/>
              <StatCard icon="✅" label="Resolved" value={st.resolved} accent="#22c55e"/>
              <StatCard icon="⏱️" label="Avg Response" value="8 min" accent="#8b5cf6"/>
              <StatCard icon="👮" label="Officers On" value={MOCK_OFFICERS.filter(o=>o.status!=="Off Duty").length} accent="#f59e0b"/>
            </div>
            <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"16px 18px",marginBottom:"14px"}}>
              <div style={{fontWeight:"700",fontSize:"13px",color:"#0f172a",marginBottom:"12px"}}>🚨 Critical & High Priority</div>
              {reports.filter(r=>r.urgency==="Critical"||r.urgency==="High").map(r=>(
                <div key={r.id} onClick={()=>setSel(r)} style={{display:"flex",alignItems:"center",gap:"8px",padding:"9px 0",borderBottom:"1px solid #f1f5f9",cursor:"pointer",flexWrap:"wrap"}}>
                  <div style={{width:"7px",height:"7px",borderRadius:"50%",background:UC[r.urgency],flexShrink:0}}></div>
                  <div style={{flex:1,minWidth:"80px"}}><span style={{fontWeight:"700",fontSize:"12px"}}>{r.id}</span><span style={{color:"#64748b",fontSize:"12px",marginLeft:"6px"}}>{r.type}</span></div>
                  <Bdg label={r.urgency} color={UC[r.urgency]} bg={UC[r.urgency]+"20"}/>
                  <Bdg label={r.status} color={SC[r.status]} bg={SB[r.status]}/>
                  <span style={{fontSize:"11px",color:"#94a3b8",whiteSpace:"nowrap"}}>{r.time}</span>
                </div>
              ))}
            </div>
            {MOCK_SOS.filter(s=>s.status==="Active").length>0&&(
              <div style={{background:"#fff1f2",border:"2px solid #fecdd3",borderRadius:"12px",padding:"13px 15px",display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
                <span style={{fontSize:"20px"}}>🆘</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:"700",fontSize:"13px",color:"#991b1b"}}>{MOCK_SOS.filter(s=>s.status==="Active").length} Active SOS Alert(s)</div>
                  <div style={{fontSize:"12px",color:"#ef4444"}}>{MOCK_SOS.find(s=>s.status==="Active")?.location}</div>
                </div>
                <button onClick={()=>setTab("sos")} style={{background:"#ef4444",color:"white",border:"none",borderRadius:"6px",padding:"7px 12px",fontWeight:"700",fontSize:"12px"}}>View →</button>
              </div>
            )}
          </div>
        )}
        {tab==="reports"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",flexWrap:"wrap",gap:"8px"}}>
              <div><h1 style={{fontSize:m?"19px":"23px",fontWeight:"800",color:"#0f172a"}}>All Reports</h1><p style={{color:"#64748b",fontSize:"12px"}}>{filtered.length} found</p></div>
              <button style={{background:"#0f172a",color:"white",border:"none",borderRadius:"8px",padding:"8px 14px",fontWeight:"600",fontSize:"12px"}}>⬇ Export CSV</button>
            </div>
            <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"10px",padding:"12px 14px",marginBottom:"12px"}}>
              <div style={{marginBottom:"8px"}}>
                <div style={{fontSize:"10px",color:"#94a3b8",fontWeight:"700",marginBottom:"5px"}}>CRIME TYPE</div>
                <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
                  {["All","Theft/Robbery","Assault","Kidnapping","Drug Related"].map(f=>(
                    <button key={f} onClick={()=>setFType(f)} style={{padding:"4px 9px",border:fType===f?"none":"1px solid #e2e8f0",borderRadius:"14px",fontSize:"11px",fontWeight:"600",background:fType===f?"#4c1d95":"white",color:fType===f?"white":"#64748b"}}>{f}</button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:"10px",color:"#94a3b8",fontWeight:"700",marginBottom:"5px"}}>STATUS</div>
                <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
                  {["All","Submitted","Assigned","En Route","On Scene","Investigating","Resolved"].map(f=>(
                    <button key={f} onClick={()=>setFStatus(f)} style={{padding:"4px 9px",border:fStatus===f?"none":"1px solid #e2e8f0",borderRadius:"14px",fontSize:"11px",fontWeight:"600",background:fStatus===f?"#0f172a":"white",color:fStatus===f?"white":"#64748b"}}>{f}</button>
                  ))}
                </div>
              </div>
            </div>
            {/* Mobile cards */}
            {m?(
              <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                {filtered.map(r=>(
                  <div key={r.id} onClick={()=>setSel(r)} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"13px 14px",cursor:"pointer",borderLeft:`4px solid ${UC[r.urgency]}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px",gap:"7px"}}>
                      <span style={{fontWeight:"800",fontSize:"13px",color:"#0f172a"}}>{r.id}</span>
                      <span style={{fontSize:"11px",color:"#94a3b8"}}>{r.time}</span>
                    </div>
                    <div style={{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"6px"}}>
                      <Bdg label={r.type} color="#374151" bg="#f1f5f9"/>
                      <Bdg label={r.urgency} color={UC[r.urgency]} bg={UC[r.urgency]+"20"}/>
                      <Bdg label={r.status} color={SC[r.status]} bg={SB[r.status]}/>
                    </div>
                    <div style={{fontSize:"11px",color:"#94a3b8"}}>📍 {r.location}</div>
                  </div>
                ))}
              </div>
            ):(
              <div className="tbl-wrap">
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:"700px"}}>
                  <thead>
                    <tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
                      {["ID","Type","Urgency","Status","Location","Reporter","Officer","Time",""].map(h=>(
                        <th key={h} style={{padding:"10px 12px",textAlign:"left",fontSize:"10px",fontWeight:"700",color:"#94a3b8",letterSpacing:"0.5px",whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map((r,i)=>(
                      <tr key={r.id} style={{borderBottom:"1px solid #f1f5f9",background:i%2===0?"white":"#fafafa"}}>
                        <td style={{padding:"10px 12px",fontWeight:"700",fontSize:"12px",color:"#0f172a",whiteSpace:"nowrap"}}>{r.id}</td>
                        <td style={{padding:"10px 12px",fontSize:"12px",color:"#374151",whiteSpace:"nowrap"}}>{r.type}</td>
                        <td style={{padding:"10px 12px"}}><Bdg label={r.urgency} color={UC[r.urgency]} bg={UC[r.urgency]+"20"}/></td>
                        <td style={{padding:"10px 12px"}}><Bdg label={r.status} color={SC[r.status]} bg={SB[r.status]}/></td>
                        <td style={{padding:"10px 12px",fontSize:"11px",color:"#64748b",whiteSpace:"nowrap"}}>{r.location}</td>
                        <td style={{padding:"10px 12px",fontSize:"11px",color:"#64748b",whiteSpace:"nowrap"}}>{r.reporter==="Anonymous"?"🔒 Anon":r.reporter}</td>
                        <td style={{padding:"10px 12px",fontSize:"11px",color:"#64748b",whiteSpace:"nowrap"}}>{r.officer||"—"}</td>
                        <td style={{padding:"10px 12px",fontSize:"11px",color:"#94a3b8",whiteSpace:"nowrap"}}>{r.time}</td>
                        <td style={{padding:"10px 12px"}}><button onClick={()=>setSel(r)} style={{background:"#f1f5f9",color:"#374151",border:"none",borderRadius:"6px",padding:"5px 10px",fontSize:"11px",fontWeight:"600"}}>View</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}
        {tab==="officers"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px",flexWrap:"wrap",gap:"8px"}}>
              <div><h1 style={{fontSize:m?"19px":"23px",fontWeight:"800",color:"#0f172a"}}>Officer Management</h1><p style={{color:"#64748b",fontSize:"12px"}}>{MOCK_OFFICERS.length} registered</p></div>
              <button style={{background:"#4c1d95",color:"white",border:"none",borderRadius:"8px",padding:"8px 14px",fontWeight:"600",fontSize:"12px"}}>+ Add Officer</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"9px"}}>
              {MOCK_OFFICERS.map(o=>(
                <div key={o.id} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:m?"14px":"16px 20px",display:"flex",alignItems:m?"flex-start":"center",gap:"13px",flexDirection:m?"column":"row"}}>
                  <div style={{width:"42px",height:"42px",background:o.status==="Off Duty"?"#f1f5f9":"#1d4ed8",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:0}}>👮</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:"700",fontSize:"14px",color:"#0f172a"}}>{o.name}</div>
                    <div style={{fontSize:"12px",color:"#64748b"}}>{o.rank} · {o.station} · {o.id}</div>
                  </div>
                  <div style={{display:"flex",gap:"14px",alignItems:"center",flexWrap:"wrap",width:m?"100%":"auto"}}>
                    <div style={{textAlign:"center"}}><div style={{fontSize:"14px",fontWeight:"800",color:"#0f172a"}}>{o.cases}</div><div style={{fontSize:"10px",color:"#94a3b8"}}>Active</div></div>
                    <div style={{textAlign:"center"}}><div style={{fontSize:"14px",fontWeight:"800",color:"#22c55e"}}>{o.resolved}</div><div style={{fontSize:"10px",color:"#94a3b8"}}>Resolved</div></div>
                    <Bdg label={o.status} color={o.status==="On Duty"?"#22c55e":o.status==="On Scene"?"#f97316":"#94a3b8"} bg={o.status==="On Duty"?"#f0fdf4":o.status==="On Scene"?"#fff7ed":"#f8fafc"}/>
                    <div style={{display:"flex",gap:"5px",marginLeft:m?"0":"auto"}}>
                      <button style={{background:"#f1f5f9",border:"none",borderRadius:"6px",padding:"6px 10px",fontSize:"11px",fontWeight:"600",color:"#374151"}}>Assign</button>
                      <button style={{background:"#fee2e2",border:"none",borderRadius:"6px",padding:"6px 10px",fontSize:"11px",fontWeight:"600",color:"#dc2626"}}>Suspend</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        {tab==="heatmap"&&(
          <div>
            <h1 style={{fontSize:m?"19px":"23px",fontWeight:"800",color:"#0f172a",marginBottom:"5px"}}>Crime Heatmap</h1>
            <p style={{color:"#64748b",fontSize:"12px",marginBottom:"16px"}}>Anonymized incident clusters — Lagos State</p>
            <div style={{background:"#0f172a",borderRadius:"12px",padding:m?"16px":"28px",minHeight:m?"260px":"360px",position:"relative",overflow:"hidden"}}>
              <div style={{textAlign:"center",color:"#475569",marginBottom:"10px",fontSize:"10px",letterSpacing:"1px"}}>LAGOS STATE — INCIDENT DENSITY MAP</div>
              {[{label:"Ikeja",top:"30%",left:"42%",intensity:"#ef4444",count:12},{label:"VI",top:"65%",left:"70%",intensity:"#f97316",count:8},{label:"Surulere",top:"50%",left:"35%",intensity:"#f59e0b",count:5},{label:"Lekki",top:"60%",left:"80%",intensity:"#f97316",count:7},{label:"Agege",top:"22%",left:"25%",intensity:"#f59e0b",count:4},{label:"Yaba",top:"45%",left:"48%",intensity:"#22c55e",count:2},{label:"Oshodi",top:"38%",left:"30%",intensity:"#ef4444",count:9}].map(z=>(
                <div key={z.label} style={{position:"absolute",top:z.top,left:z.left,transform:"translate(-50%,-50%)"}}>
                  <div style={{width:m?"38px":"54px",height:m?"38px":"54px",borderRadius:"50%",background:z.intensity+"40",border:`2px solid ${z.intensity}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                    <div style={{fontSize:m?"11px":"13px",fontWeight:"800",color:z.intensity}}>{z.count}</div>
                  </div>
                  <div style={{textAlign:"center",fontSize:"9px",color:"#94a3b8",marginTop:"2px"}}>{z.label}</div>
                </div>
              ))}
              <div style={{position:"absolute",bottom:"10px",right:"10px",background:"#1e293b",borderRadius:"7px",padding:"8px 10px"}}>
                {[["#ef4444","High"],["#f97316","Med"],["#f59e0b","Low"],["#22c55e","Min"]].map(([c,l])=>(
                  <div key={l} style={{display:"flex",alignItems:"center",gap:"5px",marginBottom:"2px"}}>
                    <div style={{width:"7px",height:"7px",borderRadius:"50%",background:c,flexShrink:0}}></div>
                    <span style={{fontSize:"9px",color:"#94a3b8"}}>{l}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="grid-zone" style={{marginTop:"14px"}}>
              {[{zone:"Ikeja",reports:12,trend:"↑ +3",color:"#ef4444"},{zone:"Oshodi",reports:9,trend:"↑ +1",color:"#ef4444"},{zone:"Victoria Island",reports:8,trend:"→ 0",color:"#f97316"},{zone:"Lekki",reports:7,trend:"↓ -2",color:"#f97316"}].map(z=>(
                <div key={z.zone} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"10px",padding:"11px 13px",borderLeft:`4px solid ${z.color}`}}>
                  <div style={{fontWeight:"700",fontSize:"12px",color:"#0f172a"}}>{z.zone}</div>
                  <div style={{fontSize:"18px",fontWeight:"800",color:z.color}}>{z.reports}</div>
                  <div style={{fontSize:"11px",color:"#94a3b8"}}>{z.trend}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        {tab==="sos"&&(
          <div>
            <h1 style={{fontSize:m?"19px":"23px",fontWeight:"800",color:"#0f172a",marginBottom:"5px"}}>SOS Incident Log</h1>
            <p style={{color:"#64748b",fontSize:"12px",marginBottom:"16px"}}>All panic button activations</p>
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {MOCK_SOS.map(s=>(
                <div key={s.id} style={{background:s.status==="Active"?"#fff1f2":"white",border:`1px solid ${s.status==="Active"?"#fecdd3":"#e2e8f0"}`,borderRadius:"12px",padding:"16px",borderLeft:`4px solid ${s.status==="Active"?"#ef4444":"#22c55e"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px",flexWrap:"wrap",gap:"6px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"7px",flexWrap:"wrap"}}>
                      <span style={{fontWeight:"800",fontSize:"13px"}}>{s.id}</span>
                      <Bdg label={s.status} color={s.status==="Active"?"#ef4444":"#22c55e"} bg={s.status==="Active"?"#fee2e2":"#f0fdf4"}/>
                      {s.recorded&&<Bdg label="🎙️ Recorded" color="#7c3aed" bg="#f5f3ff"/>}
                    </div>
                    <span style={{fontSize:"11px",color:"#94a3b8"}}>{s.time}</span>
                  </div>
                  <div style={{fontSize:"13px",color:"#374151",marginBottom:"3px"}}>📍 {s.location}</div>
                  <div style={{fontSize:"13px",color:"#374151",marginBottom:s.status==="Active"?"10px":"0"}}>📞 {s.reporter}</div>
                  {s.status==="Active"&&(
                    <div style={{display:"flex",gap:"7px",flexWrap:"wrap"}}>
                      <button style={{background:"#ef4444",color:"white",border:"none",borderRadius:"6px",padding:"8px 14px",fontWeight:"700",fontSize:"12px"}}>Dispatch Now</button>
                      <button style={{background:"white",color:"#374151",border:"1px solid #d1d5db",borderRadius:"6px",padding:"8px 11px",fontWeight:"600",fontSize:"12px"}}>Live Location</button>
                      <button style={{background:"white",color:"#374151",border:"1px solid #d1d5db",borderRadius:"6px",padding:"8px 11px",fontWeight:"600",fontSize:"12px"}}>Recording</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}
        {tab==="broadcast"&&(
          <div>
            <h1 style={{fontSize:m?"19px":"23px",fontWeight:"800",color:"#0f172a",marginBottom:"5px"}}>Broadcast Alerts</h1>
            <p style={{color:"#64748b",fontSize:"12px",marginBottom:"18px"}}>Send push notifications to citizens</p>
            <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:m?"18px":"24px 28px",marginBottom:"22px"}}>
              <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"5px"}}>Target Region</label>
              <select style={{width:"100%",padding:"12px 12px",border:"1px solid #d1d5db",borderRadius:"8px",fontSize:"14px",marginBottom:"14px",background:"white",outline:"none"}}>
                <option>All Lagos State</option><option>Ikeja Division</option><option>Victoria Island Division</option><option>Surulere Division</option><option>Lekki Division</option>
              </select>
              <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"7px"}}>Alert Type</label>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"7px",marginBottom:"14px"}}>
                {[["🔴","Emergency"],["🟡","Warning"],["🔵","Info"]].map(([ico,lbl])=>(
                  <button key={lbl} style={{padding:"9px",border:"1px solid #d1d5db",borderRadius:"8px",background:"white",fontSize:"12px",fontWeight:"600"}}>{ico} {lbl}</button>
                ))}
              </div>
              <label style={{display:"block",fontWeight:"600",fontSize:"13px",color:"#374151",marginBottom:"5px"}}>Message</label>
              <textarea value={bMsg} onChange={e=>setBMsg(e.target.value)} placeholder="Type your public safety alert here..."
                style={{width:"100%",minHeight:"85px",padding:"11px 12px",border:"1px solid #d1d5db",borderRadius:"8px",fontSize:"14px",resize:"vertical",outline:"none",fontFamily:"inherit",marginBottom:"14px"}}/>
              <button onClick={broadcast} style={{width:"100%",background:bSent?"#22c55e":"#4c1d95",color:"white",border:"none",borderRadius:"8px",padding:"13px",fontWeight:"700",fontSize:"14px",transition:"background .3s"}}>
                {bSent?"✓ Broadcast Sent!":"📢 Send Broadcast"}
              </button>
            </div>
            <div style={{fontWeight:"700",fontSize:"13px",color:"#0f172a",marginBottom:"10px"}}>Recent Broadcasts</div>
            {[{msg:"Road closure on Eko Bridge due to incident. Use alternative routes.",time:"Today 10:22",region:"All Lagos"},{msg:"Avoid Oshodi underbridge area. Police operation in progress.",time:"Yesterday 18:04",region:"Oshodi"}].map((b,i)=>(
              <div key={i} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"10px",padding:"12px 14px",marginBottom:"7px"}}>
                <div style={{fontSize:"13px",color:"#374151",marginBottom:"4px"}}>{b.msg}</div>
                <div style={{fontSize:"11px",color:"#94a3b8"}}>{b.time} · {b.region}</div>
              </div>
            ))}
          </div>
        )}
        {tab==="analytics"&&(
          <div>
            <h1 style={{fontSize:m?"19px":"23px",fontWeight:"800",color:"#0f172a",marginBottom:"5px"}}>Analytics & Reports</h1>
            <p style={{color:"#64748b",fontSize:"12px",marginBottom:"18px"}}>Performance metrics and trends</p>
            <div className="grid2" style={{marginBottom:"16px"}}>
              <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"16px 18px"}}>
                <div style={{fontWeight:"700",fontSize:"13px",color:"#0f172a",marginBottom:"12px"}}>Reports by Crime Type</div>
                {[["Theft/Robbery",35,"#ef4444"],["Assault",22,"#f97316"],["Drug Related",18,"#f59e0b"],["Vandalism",14,"#3b82f6"],["Fraud/Scam",11,"#8b5cf6"]].map(([l,p,c])=>(
                  <div key={l} style={{marginBottom:"8px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",marginBottom:"3px"}}>
                      <span style={{color:"#374151"}}>{l}</span><span style={{fontWeight:"700"}}>{p}%</span>
                    </div>
                    <div style={{background:"#f1f5f9",borderRadius:"3px",height:"5px"}}>
                      <div style={{background:c,width:`${p}%`,height:"5px",borderRadius:"3px"}}></div>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"16px 18px"}}>
                <div style={{fontWeight:"700",fontSize:"13px",color:"#0f172a",marginBottom:"12px"}}>Response Time by Urgency</div>
                {[["Critical","4 min","#ef4444",90],["High","8 min","#f97316",70],["Medium","15 min","#f59e0b",50],["Low","32 min","#22c55e",30]].map(([l,t,c,p])=>(
                  <div key={l} style={{marginBottom:"10px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",marginBottom:"3px"}}>
                      <span style={{color:"#374151"}}>{l}</span><span style={{fontWeight:"700",color:c}}>{t}</span>
                    </div>
                    <div style={{background:"#f1f5f9",borderRadius:"3px",height:"5px"}}>
                      <div style={{background:c,width:`${p}%`,height:"5px",borderRadius:"3px"}}></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"16px 18px",marginBottom:"14px"}}>
              <div style={{fontWeight:"700",fontSize:"13px",color:"#0f172a",marginBottom:"12px"}}>Weekly Report Volume</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:m?"6px":"10px",height:"75px"}}>
                {[{day:"Mon",val:60},{day:"Tue",val:80},{day:"Wed",val:45},{day:"Thu",val:90},{day:"Fri",val:75},{day:"Sat",val:55},{day:"Sun",val:40}].map(d=>(
                  <div key={d.day} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}>
                    <div style={{background:"#4c1d95",width:"100%",height:`${d.val}%`,borderRadius:"3px 3px 0 0",minHeight:"5px"}}></div>
                    <span style={{fontSize:"10px",color:"#94a3b8"}}>{d.day}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:"9px",flexWrap:"wrap"}}>
              <button style={{background:"#0f172a",color:"white",border:"none",borderRadius:"8px",padding:"9px 16px",fontWeight:"600",fontSize:"12px"}}>⬇ Export PDF</button>
              <button style={{background:"white",color:"#374151",border:"1px solid #d1d5db",borderRadius:"8px",padding:"9px 16px",fontWeight:"600",fontSize:"12px"}}>⬇ Export CSV</button>
            </div>
          </div>
        )}
        {tab==="vault"&&(
          <div>
            <h1 style={{fontSize:m?"19px":"23px",fontWeight:"800",color:"#0f172a",marginBottom:"5px"}}>Evidence Vault</h1>
            <p style={{color:"#64748b",fontSize:"12px",marginBottom:"14px"}}>Tamper-proof forensic media with audit trail</p>
            <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:"10px",padding:"11px 13px",marginBottom:"14px",fontSize:"12px",color:"#92400e",lineHeight:1.5}}>
              🔐 AES-256 encrypted. Access fully logged and audited. Unauthorized access is a federal offense.
            </div>
            <div className="grid2" style={{marginBottom:"18px"}}>
              {[{id:"RPT-001",type:"Photo",count:2,size:"4.2 MB",sealed:true},{id:"RPT-002",type:"Video",count:1,size:"28 MB",sealed:true},{id:"RPT-003",type:"Photo",count:3,size:"6.8 MB",sealed:false},{id:"RPT-006",type:"Photo",count:2,size:"3.1 MB",sealed:true}].map(e=>(
                <div key={e.id} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"14px 15px"}}>
                  <div style={{fontSize:"24px",marginBottom:"7px"}}>{e.type==="Photo"?"🖼️":"🎥"}</div>
                  <div style={{fontWeight:"700",fontSize:"13px",color:"#0f172a",marginBottom:"3px"}}>{e.id}</div>
                  <div style={{fontSize:"12px",color:"#64748b",marginBottom:"7px"}}>{e.count} file(s) · {e.size}</div>
                  <Bdg label={e.sealed?"🔏 Sealed":"🔓 Accessible"} color={e.sealed?"#7c3aed":"#374151"} bg={e.sealed?"#f5f3ff":"#f8fafc"}/>
                  <button style={{background:"#f1f5f9",border:"none",borderRadius:"6px",padding:"7px 11px",fontSize:"11px",fontWeight:"600",color:"#374151",width:"100%",marginTop:"9px"}}>View + Audit Log</button>
                </div>
              ))}
            </div>
            <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:"12px",padding:"16px 18px"}}>
              <div style={{fontWeight:"700",fontSize:"13px",color:"#0f172a",marginBottom:"10px"}}>Recent Audit Trail</div>
              {[{action:"Evidence accessed",user:"Admin",report:"RPT-003",time:"Today 11:04"},{action:"Evidence sealed",user:"System",report:"RPT-001",time:"Today 09:21"},{action:"Evidence uploaded",user:"Sgt. Adebayo",report:"RPT-006",time:"Yesterday 17:45"},{action:"Evidence viewed",user:"Insp. Bello",report:"RPT-002",time:"Yesterday 14:12"}].map((a,i)=>(
                <div key={i} style={{display:"flex",gap:"7px",padding:"8px 0",borderBottom:"1px solid #f1f5f9",fontSize:"12px",flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{color:"#94a3b8",whiteSpace:"nowrap",fontSize:"11px"}}>{a.time}</span>
                  <span style={{fontWeight:"600",color:"#0f172a"}}>{a.action}</span>
                  <span style={{color:"#64748b"}}>by {a.user}</span>
                  <span style={{color:"#3b82f6",marginLeft:"auto",fontWeight:"600"}}>{a.report}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
      {sel&&<ReportDetailModal report={sel} onClose={()=>setSel(null)} onStatusChange={upStatus} isAdmin={true}/>}
    </div>
  );
}

/* ── LOGIN PAGE ── */
function LoginPage({onSuccess}){
  const m=useIsMobile();
  const[role,setRole]=useState(null);
  const[badge,setBadge]=useState("");
  const[otp,setOtp]=useState("");
  const[step,setStep]=useState(1);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const C=role==="police"?{badge:"LG-4421",otp:"112112"}:{badge:"ADMIN-01",otp:"999999"};
  async function hBadge(){if(!badge){setError("Enter your ID");return;}setLoading(true);setError("");await new Promise(r=>setTimeout(r,700));setLoading(false);if(badge.toUpperCase()!==C.badge){setError("ID not found");return;}setStep(2);}
  async function hOtp(){if(!otp){setError("Enter OTP");return;}setLoading(true);setError("");await new Promise(r=>setTimeout(r,700));setLoading(false);if(otp!==C.otp){setError("Invalid OTP — try "+C.otp);return;}onSuccess(role);}
  function back(){setStep(1);setBadge("");setOtp("");setError("");}

  return(
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 16px"}}>
      {/* Logo */}
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"32px"}}>
        <div style={{background:"#f59e0b",borderRadius:"8px",width:"40px",height:"40px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"900",color:"#0f172a",fontSize:"15px"}}>RP</div>
        <div>
          <div style={{color:"white",fontWeight:"800",fontSize:"18px",lineHeight:1}}>RePolice</div>
          <div style={{color:"#475569",fontSize:"9px",letterSpacing:"2px",textTransform:"uppercase"}}>STAFF ACCESS</div>
        </div>
      </div>

      <div style={{background:"white",borderRadius:"16px",width:"100%",maxWidth:"380px",overflow:"hidden",boxShadow:"0 24px 60px rgba(0,0,0,.4)"}}>
        {/* Header bar */}
        <div style={{background:role==="admin"?"#4c1d95":role==="police"?"#1d4ed8":"#0f172a",padding:"20px 24px"}}>
          <div style={{fontSize:"28px",marginBottom:"6px"}}>{role==="police"?"👮":role==="admin"?"🛡️":"🔐"}</div>
          <h1 style={{color:"white",fontWeight:"800",fontSize:"18px",marginBottom:"3px"}}>
            {!role?"Staff Login":role==="police"?"Police Officer Login":"Admin Panel Login"}
          </h1>
          <p style={{color:"rgba(255,255,255,.6)",fontSize:"12px"}}>
            {!role?"Select your access role below":step===1?"Enter your badge / admin ID":"Enter the OTP sent to your number"}
          </p>
        </div>

        <div style={{padding:"24px"}}>
          {/* Role selector */}
          {!role&&(
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              <button onClick={()=>setRole("police")} style={{background:"#eff6ff",border:"2px solid #bfdbfe",borderRadius:"10px",padding:"16px",display:"flex",alignItems:"center",gap:"12px",fontWeight:"700",fontSize:"14px",color:"#1d4ed8"}}>
                <span style={{fontSize:"24px"}}>👮</span>
                <div style={{textAlign:"left"}}>
                  <div style={{fontWeight:"700",fontSize:"14px"}}>Police Officer</div>
                  <div style={{fontWeight:"400",fontSize:"11px",color:"#64748b"}}>Access assigned cases & SOS alerts</div>
                </div>
              </button>
              <button onClick={()=>setRole("admin")} style={{background:"#f5f3ff",border:"2px solid #ddd6fe",borderRadius:"10px",padding:"16px",display:"flex",alignItems:"center",gap:"12px",fontWeight:"700",fontSize:"14px",color:"#7c3aed"}}>
                <span style={{fontSize:"24px"}}>🛡️</span>
                <div style={{textAlign:"left"}}>
                  <div style={{fontWeight:"700",fontSize:"14px"}}>Administrator</div>
                  <div style={{fontWeight:"400",fontSize:"11px",color:"#64748b"}}>Full command dashboard access</div>
                </div>
              </button>
              <div style={{marginTop:"8px",padding:"10px 12px",background:"#f8fafc",borderRadius:"8px",fontSize:"11px",color:"#94a3b8",textAlign:"center",lineHeight:1.5}}>
                🔒 Authorized personnel only. All access is logged and audited.
              </div>
            </div>
          )}

          {/* Badge step */}
          {role&&step===1&&(
            <div>
              <label style={{fontSize:"13px",fontWeight:"600",color:"#374151",display:"block",marginBottom:"6px"}}>{role==="police"?"Badge ID":"Admin ID"}</label>
              <input value={badge} onChange={e=>setBadge(e.target.value)} onKeyDown={e=>e.key==="Enter"&&hBadge()} placeholder={role==="police"?"e.g. LG-4421":"e.g. ADMIN-01"}
                style={{width:"100%",padding:"13px",border:"1px solid #d1d5db",borderRadius:"8px",fontSize:"15px",marginBottom:"6px",outline:"none",fontFamily:"inherit"}}/>
              {error&&<p style={{color:"#ef4444",fontSize:"12px",marginBottom:"6px"}}>{error}</p>}
              <p style={{fontSize:"11px",color:"#94a3b8",marginBottom:"16px"}}>Demo: <strong>{C.badge}</strong></p>
              <button onClick={hBadge} style={{width:"100%",background:role==="police"?"#1d4ed8":"#7c3aed",color:"white",border:"none",borderRadius:"8px",padding:"14px",fontWeight:"700",fontSize:"14px"}}>
                {loading?"Verifying…":"Continue →"}
              </button>
              <button onClick={()=>{setRole(null);setStep(1);setBadge("");setError("");}} style={{width:"100%",background:"none",border:"none",color:"#94a3b8",fontSize:"13px",marginTop:"10px",padding:"8px"}}>← Back</button>
            </div>
          )}

          {/* OTP step */}
          {role&&step===2&&(
            <div>
              <label style={{fontSize:"13px",fontWeight:"600",color:"#374151",display:"block",marginBottom:"6px"}}>OTP Code</label>
              <input value={otp} onChange={e=>setOtp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&hOtp()} placeholder="6-digit OTP"
                style={{width:"100%",padding:"13px",border:"1px solid #d1d5db",borderRadius:"8px",fontSize:"22px",marginBottom:"6px",outline:"none",letterSpacing:"10px",textAlign:"center",fontFamily:"monospace"}}/>
              {error&&<p style={{color:"#ef4444",fontSize:"12px",marginBottom:"6px"}}>{error}</p>}
              <p style={{fontSize:"11px",color:"#94a3b8",marginBottom:"16px"}}>Demo OTP: <strong>{C.otp}</strong></p>
              <button onClick={hOtp} style={{width:"100%",background:role==="police"?"#1d4ed8":"#7c3aed",color:"white",border:"none",borderRadius:"8px",padding:"14px",fontWeight:"700",fontSize:"14px"}}>
                {loading?"Authenticating…":"Login →"}
              </button>
              <button onClick={back} style={{width:"100%",background:"none",border:"none",color:"#94a3b8",fontSize:"13px",marginTop:"10px",padding:"8px"}}>← Back</button>
            </div>
          )}
        </div>
      </div>

      <p style={{color:"#334155",fontSize:"11px",marginTop:"20px",textAlign:"center"}}>
        © 2026 RePolice Beta · <a href="#home" style={{color:"#475569",textDecoration:"none"}}>← Back to Home</a>
      </p>
    </div>
  );
}

/* ── ROOT ── */
function App(){
  function getHash(){return window.location.hash.replace("#","").split("?")[0]||"home";}
  const[view,setView]=useState(getHash);

  useEffect(()=>{
    const handler=()=>setView(getHash());
    window.addEventListener("hashchange",handler);
    return()=>window.removeEventListener("hashchange",handler);
  },[]);

  function nav(v){window.location.hash=v;setView(v);}

  return(
    <div>
      {view!=="police"&&view!=="admin"&&view!=="login"&&(
        <Navbar
          onHome={()=>nav("home")}
          onReport={()=>nav("report")}
          onMyReports={()=>nav("myreports")}
          onPoliceLogin={()=>nav("login")}
          onAdminLogin={()=>nav("login")}
        />
      )}
      {view==="home"&&<HomePage onReport={()=>nav("report")}/>}
      {view==="report"&&<ReportForm onSuccess={()=>nav("success")} onCancel={()=>nav("home")}/>}
      {view==="success"&&<SuccessScreen onDashboard={()=>nav("home")}/>}
      {view==="myreports"&&<MyReportsPage/>}
      {view==="login"&&<LoginPage onSuccess={(role)=>nav(role)}/>}
      {view==="police"&&<PolicePanel onLogout={()=>nav("home")}/>}
      {view==="admin"&&<AdminPanel onLogout={()=>nav("home")}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
